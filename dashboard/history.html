<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>History | LINK4 Communication</title>

<style>

/* =====================================================
   RESET
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  min-height:100vh;

  background:
    linear-gradient(
      135deg,
      #071b16 0%,
      #0b2b24 45%,
      #061713 100%
    );

  color:#eaf7f2;

  padding:25px;
}


/* =====================================================
   MAIN CONTAINER
===================================================== */

.container{

  width:100%;

  max-width:1450px;

  margin:auto;

}


/* =====================================================
   HEADER
===================================================== */

.header{

  display:flex;

  justify-content:
    space-between;

  align-items:center;

  gap:20px;

  margin-bottom:22px;

  flex-wrap:wrap;

}

.title-area h1{

  font-size:28px;

  font-weight:700;

  color:#ffffff;

}

.title-area p{

  margin-top:6px;

  color:#a9c8bd;

  font-size:14px;

}


/* =====================================================
   HEADER BUTTON
===================================================== */

.header-actions{

  display:flex;

  gap:10px;

  flex-wrap:wrap;

}

button{

  border:none;

  cursor:pointer;

  font-family:inherit;

  transition:
    0.2s ease;

}

.refresh-btn{

  background:
    #19a974;

  color:white;

  padding:
    11px 18px;

  border-radius:
    8px;

  font-weight:
    600;

}

.refresh-btn:hover{

  background:
    #22c488;

  transform:
    translateY(-1px);

}


/* =====================================================
   FILTER PANEL
===================================================== */

.filter-panel{

  background:
    rgba(
      13,
      47,
      39,
      0.95
    );

  border:
    1px solid
    rgba(
      103,
      196,
      161,
      0.20
    );

  border-radius:
    14px;

  padding:
    18px;

  margin-bottom:
    20px;

  box-shadow:
    0 10px 30px
    rgba(
      0,
      0,
      0,
      0.18
    );

}


/* =====================================================
   FILTER GRID
===================================================== */

.filter-grid{

  display:grid;

  grid-template-columns:
    2fr
    1fr
    1fr
    1fr
    auto
    auto;

  gap:12px;

  align-items:end;

}


/* =====================================================
   INPUT GROUP
===================================================== */

.input-group{

  display:flex;

  flex-direction:column;

  gap:6px;

}

.input-group label{

  font-size:
    12px;

  color:
    #a9c8bd;

  font-weight:
    600;

}

.input-group input{

  width:100%;

  height:43px;

  padding:
    0 12px;

  border:
    1px solid
    rgba(
      120,
      190,
      170,
      0.25
    );

  border-radius:
    8px;

  outline:none;

  background:
    #09241e;

  color:
    #ffffff;

  font-size:
    14px;

}

.input-group input:focus{

  border-color:
    #21b77d;

  box-shadow:
    0 0 0 3px
    rgba(
      33,
      183,
      125,
      0.12
    );

}


/* =====================================================
   FILTER BUTTONS
===================================================== */

.filter-btn{

  height:43px;

  padding:
    0 18px;

  border-radius:
    8px;

  background:
    #168c68;

  color:white;

  font-weight:
    600;

}

.filter-btn:hover{

  background:
    #1eaf80;

}

.clear-btn{

  height:43px;

  padding:
    0 18px;

  border-radius:
    8px;

  background:
    #233b35;

  color:
    #d8ebe5;

  font-weight:
    600;

}

.clear-btn:hover{

  background:
    #304e46;

}


/* =====================================================
   INFO BAR
===================================================== */

.info-bar{

  display:flex;

  justify-content:
    space-between;

  align-items:center;

  gap:15px;

  margin-bottom:
    12px;

  flex-wrap:wrap;

}

.result-count{

  color:
    #a9c8bd;

  font-size:
    14px;

}

.status{

  font-size:
    13px;

  color:
    #8ddbbd;

}


/* =====================================================
   TABLE CONTAINER
===================================================== */

.table-wrapper{

  width:100%;

  overflow-x:auto;

  background:
    rgba(
      8,
      31,
      26,
      0.96
    );

  border:
    1px solid
    rgba(
      103,
      196,
      161,
      0.18
    );

  border-radius:
    14px;

  box-shadow:
    0 15px 40px
    rgba(
      0,
      0,
      0,
      0.20
    );

}


/* =====================================================
   TABLE
===================================================== */

table{

  width:100%;

  border-collapse:
    collapse;

  min-width:
    900px;

}

thead{

  background:
    #0d3b30;

}

th{

  padding:
    15px 14px;

  text-align:
    left;

  color:
    #bde8d8;

  font-size:
    13px;

  font-weight:
    700;

  white-space:
    nowrap;

  border-bottom:
    1px solid
    rgba(
      103,
      196,
      161,
      0.20
    );

}

td{

  padding:
    14px;

  border-bottom:
    1px solid
    rgba(
      103,
      196,
      161,
      0.09
    );

  color:
    #dcece7;

  font-size:
    13px;

  vertical-align:
    middle;

}

tbody tr{

  transition:
    background
    0.2s ease;

}

tbody tr:hover{

  background:
    rgba(
      27,
      123,
      91,
      0.10
    );

}


/* =====================================================
   VIEW BUTTON
===================================================== */

.view-btn{

  background:
    #147d60;

  color:
    white;

  padding:
    8px 15px;

  border-radius:
    7px;

  font-size:
    12px;

  font-weight:
    600;

}

.view-btn:hover{

  background:
    #1ca878;

}


/* =====================================================
   EMPTY
===================================================== */

.empty{

  text-align:
    center;

  padding:
    55px 20px;

  color:
    #88aaa0;

}

.empty-icon{

  font-size:
    35px;

  margin-bottom:
    10px;

}


/* =====================================================
   LOADING
===================================================== */

.loading{

  text-align:
    center;

  padding:
    50px;

  color:
    #9fc5b8;

}


/* =====================================================
   MODAL OVERLAY
===================================================== */

.modal{

  position:
    fixed;

  inset:
    0;

  background:
    rgba(
      0,
      0,
      0,
      0.70
    );

  display:
    none;

  align-items:
    center;

  justify-content:
    center;

  padding:
    20px;

  z-index:
    9999;

}

.modal.show{

  display:
    flex;

}


/* =====================================================
   MODAL BOX
===================================================== */

.modal-box{

  width:
    100%;

  max-width:
    700px;

  max-height:
    90vh;

  overflow-y:
    auto;

  background:
    #0b2b24;

  border:
    1px solid
    rgba(
      103,
      196,
      161,
      0.25
    );

  border-radius:
    16px;

  box-shadow:
    0 25px 70px
    rgba(
      0,
      0,
      0,
      0.45
    );

}


/* =====================================================
   MODAL HEADER
===================================================== */

.modal-header{

  display:flex;

  justify-content:
    space-between;

  align-items:center;

  padding:
    18px 20px;

  border-bottom:
    1px solid
    rgba(
      103,
      196,
      161,
      0.15
    );

}

.modal-header h2{

  font-size:
    20px;

  color:
    #ffffff;

}

.close-btn{

  width:
    35px;

  height:
    35px;

  border-radius:
    50%;

  background:
    #193d34;

  color:
    #d9eee7;

  font-size:
    20px;

}

.close-btn:hover{

  background:
    #285449;

}


/* =====================================================
   MODAL BODY
===================================================== */

.modal-body{

  padding:
    20px;

}


/* =====================================================
   DETAILS GRID
===================================================== */

.details-grid{

  display:grid;

  grid-template-columns:
    1fr
    1fr;

  gap:
    12px;

}


/* =====================================================
   DETAIL CARD
===================================================== */

.detail-item{

  background:
    #09231d;

  border:
    1px solid
    rgba(
      103,
      196,
      161,
      0.13
    );

  border-radius:
    10px;

  padding:
    13px;

}

.detail-item.full{

  grid-column:
    1 / -1;

}

.detail-label{

  display:block;

  font-size:
    11px;

  color:
    #7fb4a4;

  font-weight:
    700;

  margin-bottom:
    6px;

  text-transform:
    uppercase;

}

.detail-value{

  color:
    #edf8f4;

  font-size:
    14px;

  line-height:
    1.5;

  white-space:
    pre-wrap;

  word-break:
    break-word;

}


/* =====================================================
   MODAL FOOTER
===================================================== */

.modal-footer{

  padding:
    15px 20px;

  border-top:
    1px solid
    rgba(
      103,
      196,
      161,
      0.15
    );

  text-align:
    right;

}

.modal-close-bottom{

  padding:
    9px 18px;

  background:
    #193d34;

  color:
    #dceee8;

  border-radius:
    8px;

}

.modal-close-bottom:hover{

  background:
    #285449;

}


/* =====================================================
   RESPONSIVE
===================================================== */

@media(
  max-width:1100px
){

  .filter-grid{

    grid-template-columns:
      1fr
      1fr
      1fr;

  }

}

@media(
  max-width:700px
){

  body{

    padding:
      12px;

  }

  .title-area h1{

    font-size:
      23px;

  }

  .filter-grid{

    grid-template-columns:
      1fr;

  }

  .details-grid{

    grid-template-columns:
      1fr;

  }

  .detail-item.full{

    grid-column:
      auto;

  }

}


/* =====================================================
   SCROLLBAR
===================================================== */

::-webkit-scrollbar{

  width:
    8px;

  height:
    8px;

}

::-webkit-scrollbar-track{

  background:
    #071b16;

}

::-webkit-scrollbar-thumb{

  background:
    #17664f;

  border-radius:
    10px;

}

::-webkit-scrollbar-thumb:hover{

  background:
    #218b6b;

}

</style>

</head>


<body>


<div class="container">


  <!-- ================================================
       HEADER
  ================================================ -->

  <div class="header">

    <div class="title-area">

      <h1>
        History
      </h1>

      <p>
        Complete Support & Call History
      </p>

    </div>


    <div class="header-actions">

      <button
        class="refresh-btn"
        onclick="loadHistory()"
      >
        ↻ Refresh
      </button>

    </div>

  </div>



  <!-- ================================================
       FILTER PANEL
  ================================================ -->

  <div class="filter-panel">

    <div class="filter-grid">


      <!-- SEARCH -->

      <div class="input-group">

        <label>
          Search
        </label>

        <input
          type="text"
          id="searchInput"
          placeholder="Search Customer ID, Problem, Reference..."
          oninput="applyFilters()"
        >

      </div>


      <!-- DATE FROM -->

      <div class="input-group">

        <label>
          Date From
        </label>

        <input
          type="date"
          id="dateFrom"
        >

      </div>


      <!-- DATE TO -->

      <div class="input-group">

        <label>
          Date To
        </label>

        <input
          type="date"
          id="dateTo"
        >

      </div>


      <!-- DAY COUNT -->

      <div class="input-group">

        <label>
          Day Count
        </label>

        <input
          type="number"
          id="dayCount"
          min="1"
          placeholder="Example: 7"
        >

      </div>


      <!-- FILTER -->

      <button
        class="filter-btn"
        onclick="applyFilters()"
      >
        🔍 Filter
      </button>


      <!-- CLEAR -->

      <button
        class="clear-btn"
        onclick="clearFilters()"
      >
        ✕ Clear
      </button>


    </div>

  </div>



  <!-- ================================================
       INFO
  ================================================ -->

  <div class="info-bar">

    <div
      class="result-count"
      id="resultCount"
    >
      Loading...
    </div>

    <div
      class="status"
      id="statusText"
    >
      Loading History...
    </div>

  </div>



  <!-- ================================================
       TABLE
  ================================================ -->

  <div class="table-wrapper">

    <table>

      <thead>

        <tr>

          <th>
            Customer ID
          </th>

          <th>
            Date
          </th>

          <th>
            Problem
          </th>

          <th>
            Reference
          </th>

          <th>
            Support
          </th>

          <th>
            Call
          </th>

          <th>
            Action
          </th>

        </tr>

      </thead>


      <tbody id="historyBody">

        <tr>

          <td
            colspan="7"
            class="loading"
          >
            Loading History...
          </td>

        </tr>

      </tbody>

    </table>

  </div>


</div>



<!-- ===================================================
     VIEW MODAL
=================================================== -->

<div
  class="modal"
  id="viewModal"
  onclick="closeModalOutside(event)"
>

  <div class="modal-box">


    <div class="modal-header">

      <h2>
        History Details
      </h2>

      <button
        class="close-btn"
        onclick="closeModal()"
      >
        ×
      </button>

    </div>


    <div class="modal-body">

      <div
        class="details-grid"
        id="detailsGrid"
      >
      </div>

    </div>


    <div class="modal-footer">

      <button
        class="modal-close-bottom"
        onclick="closeModal()"
      >
        Close
      </button>

    </div>


  </div>

</div>



<script>

/* =====================================================
   CONFIGURATION
===================================================== */


/*
   আপনার Apps Script Web App URL এখানে বসান
*/

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   GLOBAL DATA
===================================================== */

let allHistory = [];

let filteredHistory = [];


/* =====================================================
   PAGE LOAD
===================================================== */

document.addEventListener(

  "DOMContentLoaded",

  function(){

    loadHistory();

  }

);


/* =====================================================
   LOAD HISTORY
===================================================== */

async function loadHistory(){

  const body =
    document.getElementById(
      "historyBody"
    );


  const status =
    document.getElementById(
      "statusText"
    );


  body.innerHTML = `

    <tr>

      <td
        colspan="7"
        class="loading"
      >
        Loading History...
      </td>

    </tr>

  `;


  status.textContent =
    "Loading History...";


  try{


    /*
      IMPORTANT:

      Backend-এ History action যোগ করতে হবে।

      Example:
      action=history
    */

    const response =
      await fetch(

        API_URL +
        "?action=history&t=" +
        Date.now(),

        {
          method:
            "GET",

          cache:
            "no-store"

        }

      );


    const result =
      await response.json();


    if(
      !result.success
    ){

      throw new Error(

        result.message ||
        "Failed to load History."

      );

    }


    allHistory =
      Array.isArray(
        result.data
      )
      ?
        result.data
      :
        [];


    filteredHistory =
      [
        ...allHistory
      ];


    renderHistory();


    status.textContent =
      "History Loaded";


  }catch(error){


    console.error(
      error
    );


    body.innerHTML = `

      <tr>

        <td
          colspan="7"
          class="empty"
        >

          <div class="empty-icon">
            ⚠️
          </div>

          <div>
            ${escapeHtml(
              error.message
            )}
          </div>

        </td>

      </tr>

    `;


    status.textContent =
      "Failed to load History";


  }

}


/* =====================================================
   RENDER HISTORY
===================================================== */

function renderHistory(){


  const body =
    document.getElementById(
      "historyBody"
    );


  const count =
    document.getElementById(
      "resultCount"
    );


  count.textContent =

    "Showing " +
    filteredHistory.length +
    " History Record(s)";


  if(
    filteredHistory.length === 0
  ){

    body.innerHTML = `

      <tr>

        <td
          colspan="7"
          class="empty"
        >

          <div class="empty-icon">
            📂
          </div>

          No History Found

        </td>

      </tr>

    `;

    return;

  }


  body.innerHTML = "";


  filteredHistory.forEach(

    function(item,index){


      const tr =
        document.createElement(
          "tr"
        );


      tr.innerHTML = `

        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "customerId",
                "customerNumber",
                "ip"
              ]
            )
          )}
        </td>


        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "date"
              ]
            )
          )}
        </td>


        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "problem"
              ]
            )
          )}
        </td>


        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "reference",
                "ref"
              ]
            )
          )}
        </td>


        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "support"
              ]
            )
          )}
        </td>


        <td>
          ${escapeHtml(
            getValue(
              item,
              [
                "call"
              ]
            )
          )}
        </td>


        <td>

          <button
            class="view-btn"
            onclick="viewHistory(${index})"
          >
            👁 View
          </button>

        </td>

      `;


      body.appendChild(
        tr
      );


    }

  );

}


/* =====================================================
   APPLY FILTERS
===================================================== */

function applyFilters(){


  const search =
    document
      .getElementById(
        "searchInput"
      )
      .value
      .trim()
      .toLowerCase();


  const dateFrom =
    document
      .getElementById(
        "dateFrom"
      )
      .value;


  const dateTo =
    document
      .getElementById(
        "dateTo"
      )
      .value;


  const dayCount =
    parseInt(

      document
        .getElementById(
          "dayCount"
        )
        .value

    );


  let result =
    [
      ...allHistory
    ];


  /* ================================================
     SEARCH
  ================================================ */

  if(
    search
  ){

    result =
      result.filter(

        function(item){

          return Object
            .values(item)
            .some(

              function(value){

                return String(
                  value || ""
                )
                .toLowerCase()
                .includes(
                  search
                );

              }

            );

        }

      );

  }


  /* ================================================
     DATE FROM / TO
  ================================================ */

  if(
    dateFrom ||
    dateTo
  ){

    result =
      result.filter(

        function(item){

          const itemDate =
            parseHistoryDate(
              getValue(
                item,
                [
                  "date"
                ]
              )
            );


          if(
            !itemDate
          ){

            return false;

          }


          itemDate.setHours(
            0,
            0,
            0,
            0
          );


          if(
            dateFrom
          ){

            const from =
              new Date(
                dateFrom
              );


            from.setHours(
              0,
              0,
              0,
              0
            );


            if(
              itemDate < from
            ){

              return false;

            }

          }


          if(
            dateTo
          ){

            const to =
              new Date(
                dateTo
              );


            to.setHours(
              23,
              59,
              59,
              999
            );


            if(
              itemDate > to
            ){

              return false;

            }

          }


          return true;

        }

      );

  }


  /* ================================================
     DAY COUNT

     Example:
     7 = Last 7 Days
  ================================================ */

  if(
    !isNaN(dayCount) &&
    dayCount > 0
  ){

    const now =
      new Date();


    now.setHours(
      23,
      59,
      59,
      999
    );


    const start =
      new Date();


    start.setDate(

      start.getDate() -
      (
        dayCount - 1
      )

    );


    start.setHours(
      0,
      0,
      0,
      0
    );


    result =
      result.filter(

        function(item){

          const itemDate =
            parseHistoryDate(
              getValue(
                item,
                [
                  "date"
                ]
              )
            );


          if(
            !itemDate
          ){

            return false;

          }


          return (

            itemDate >=
            start

            &&

            itemDate <=
            now

          );

        }

      );

  }


  filteredHistory =
    result;


  renderHistory();

}


/* =====================================================
   CLEAR FILTERS
===================================================== */

function clearFilters(){


  document
    .getElementById(
      "searchInput"
    )
    .value =
    "";


  document
    .getElementById(
      "dateFrom"
    )
    .value =
    "";


  document
    .getElementById(
      "dateTo"
    )
    .value =
    "";


  document
    .getElementById(
      "dayCount"
    )
    .value =
    "";


  filteredHistory =
    [
      ...allHistory
    ];


  renderHistory();

}


/* =====================================================
   VIEW HISTORY
===================================================== */

function viewHistory(index){


  const item =
    filteredHistory[index];


  if(
    !item
  ){

    return;

  }


  const details = [

    [
      "Customer ID",
      getValue(
        item,
        [
          "customerId",
          "customerNumber",
          "ip"
        ]
      )
    ],

    [
      "Date",
      getValue(
        item,
        [
          "date"
        ]
      )
    ],

    [
      "Problem",
      getValue(
        item,
        [
          "problem"
        ]
      )
    ],

    [
      "Reference",
      getValue(
        item,
        [
          "reference",
          "ref"
        ]
      )
    ],

    [
      "Support",
      getValue(
        item,
        [
          "support"
        ]
      )
    ],

    [
      "Support Work",
      getValue(
        item,
        [
          "supportWork"
        ]
      )
    ],

    [
      "Call",
      getValue(
        item,
        [
          "call"
        ]
      )
    ],

    [
      "Call Work",
      getValue(
        item,
        [
          "callWork"
        ]
      )
    ]

  ];


  const grid =
    document
      .getElementById(
        "detailsGrid"
      );


  grid.innerHTML = "";


  details.forEach(

    function(detail,index){

      const div =
        document.createElement(
          "div"
        );


      if(
        index === 2 ||
        index === 3 ||
        index === 5 ||
        index === 7
      ){

        div.className =
          "detail-item full";

      }else{

        div.className =
          "detail-item";

      }


      div.innerHTML = `

        <span class="detail-label">

          ${escapeHtml(
            detail[0]
          )}

        </span>

        <div class="detail-value">

          ${escapeHtml(
            detail[1] ||
            "—"
          )}

        </div>

      `;


      grid.appendChild(
        div
      );

    }

  );


  document
    .getElementById(
      "viewModal"
    )
    .classList
    .add(
      "show"
    );

}


/* =====================================================
   CLOSE MODAL
===================================================== */

function closeModal(){

  document
    .getElementById(
      "viewModal"
    )
    .classList
    .remove(
      "show"
    );

}


/* =====================================================
   CLOSE OUTSIDE
===================================================== */

function closeModalOutside(event){

  if(
    event.target.id ===
    "viewModal"
  ){

    closeModal();

  }

}


/* =====================================================
   ESC KEY
===================================================== */

document.addEventListener(

  "keydown",

  function(event){

    if(
      event.key ===
      "Escape"
    ){

      closeModal();

    }

  }

);


/* =====================================================
   GET VALUE
===================================================== */

function getValue(
  object,
  keys
){

  for(
    let i = 0;
    i < keys.length;
    i++
  ){

    const value =
      object[
        keys[i]
      ];


    if(
      value !==
      undefined &&

      value !==
      null &&

      String(
        value
      ).trim() !==
      ""
    ){

      return String(
        value
      );

    }

  }


  return "";

}


/* =====================================================
   PARSE HISTORY DATE
===================================================== */

function parseHistoryDate(
  value
){

  if(
    !value
  ){

    return null;

  }


  const text =
    String(
      value
    ).trim();


  /*
    dd-MM-yyyy HH:mm
  */

  let match =
    text.match(

      /^(\d{1,2})-(\d{1,2})-(\d{4})/

    );


  if(
    match
  ){

    return new Date(

      Number(
        match[3]
      ),

      Number(
        match[2]
      ) - 1,

      Number(
        match[1]
      )

    );

  }


  /*
    dd/MM/yyyy
  */

  match =
    text.match(

      /^(\d{1,2})\/(\d{1,2})\/(\d{4})/

    );


  if(
    match
  ){

    return new Date(

      Number(
        match[3]
      ),

      Number(
        match[2]
      ) - 1,

      Number(
        match[1]
      )

    );

  }


  const parsed =
    new Date(
      text
    );


  if(
    !isNaN(
      parsed.getTime()
    )
  ){

    return parsed;

  }


  return null;

}


/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHtml(
  value
){

  return String(
    value ||
    ""
  )
  .replace(
    /&/g,
    "&amp;"
  )
  .replace(
    /</g,
    "&lt;"
  )
  .replace(
    />/g,
    "&gt;"
  )
  .replace(
    /"/g,
    "&quot;"
  )
  .replace(
    /'/g,
    "&#039;"
  );

}
