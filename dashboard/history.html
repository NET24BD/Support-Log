<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Log History</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<style>

/* =====================================================
   RESET
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* =====================================================
   BODY
===================================================== */

body{

    width:100%;
    min-height:100vh;

    font-family:
    Arial,
    Helvetica,
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #005b45,
        #007d61,
        #008f6d
    );

    padding:16px 24px 16px 24px;

    color:#14201d;

    transition:.3s;

}


/* =====================================================
   SIDEBAR
===================================================== */

.sidebar{

    position:fixed;

    left:0;
    top:0;
    bottom:0;

    width:260px;

    background:
    linear-gradient(
        180deg,
        #063f32,
        #005b45
    );

    z-index:1000;

    padding:20px 14px;

    box-shadow:
    5px 0 25px
    rgba(0,0,0,.18);

    transition:
    width .3s ease,
    transform .3s ease;

    overflow:hidden;

}


/* SIDEBAR COLLAPSED */

.sidebar.collapsed{

    width:78px;

}


/* SIDEBAR HEADER */

.sidebar-header{

    height:65px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:
    0 10px;

    margin-bottom:20px;

}


.sidebar-logo{

    display:flex;

    align-items:center;

    gap:12px;

    color:white;

    white-space:nowrap;

    font-size:18px;

    font-weight:bold;

}


.sidebar-logo i{

    min-width:42px;

    width:42px;

    height:42px;

    border-radius:12px;

    background:#009b73;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:20px;

}


.sidebar.collapsed
.sidebar-logo span{

    display:none;

}


.sidebar-toggle{

    width:38px;

    height:38px;

    border:none;

    border-radius:10px;

    background:
    rgba(255,255,255,.12);

    color:white;

    cursor:pointer;

    font-size:17px;

    transition:.2s;

}


.sidebar-toggle:hover{

    background:
    rgba(255,255,255,.22);

}


/* =====================================================
   SIDEBAR MENU
===================================================== */

.sidebar-menu{

    display:flex;

    flex-direction:column;

    gap:8px;

}


.sidebar-link{

    width:100%;

    height:52px;

    display:flex;

    align-items:center;

    gap:15px;

    padding:
    0 13px;

    border-radius:13px;

    color:
    rgba(255,255,255,.82);

    text-decoration:none;

    font-size:15px;

    font-weight:bold;

    white-space:nowrap;

    transition:.2s;

}


.sidebar-link i{

    min-width:30px;

    width:30px;

    text-align:center;

    font-size:18px;

}


.sidebar-link:hover{

    background:
    rgba(255,255,255,.12);

    color:white;

    transform:
    translateX(2px);

}


.sidebar-link.active{

    background:#009b73;

    color:white;

    box-shadow:
    0 7px 18px
    rgba(0,0,0,.15);

}


.sidebar.collapsed
.sidebar-link span{

    display:none;

}


.sidebar.collapsed
.sidebar-link{

    justify-content:center;

    padding:0;

}


.sidebar.collapsed
.sidebar-link i{

    margin:0;

}


/* =====================================================
   MAIN AREA
===================================================== */

.main-area{

    margin-left:0;

    transition:
    margin-left .3s ease;

}


body.sidebar-open
.main-area{

    margin-left:260px;

}


body.sidebar-collapsed
.main-area{

    margin-left:78px;

}


/* =====================================================
   MAIN CONTAINER
===================================================== */

.container{

    width:100%;

    max-width:1500px;

    margin:auto;

}


/* =====================================================
   HEADER
===================================================== */

.header{

    background:#f7fbfa;

    border-radius:26px;

    min-height:122px;

    padding:24px 30px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:20px;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.08);

}


.header-left{

    display:flex;

    align-items:center;

    gap:20px;

}


.header-icon{

    width:74px;

    height:74px;

    border-radius:20px;

    background:#009b73;

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:34px;

    box-shadow:
    0 10px 20px
    rgba(0,120,90,.25);

}


.header-title h1{

    font-size:32px;

    color:#00765b;

    margin-bottom:5px;

}


.header-title p{

    font-size:16px;

    color:#66736f;

}


.header-buttons{

    display:flex;

    gap:12px;

}


.btn{

    border:none;

    border-radius:15px;

    padding:14px 22px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

    display:flex;

    align-items:center;

    gap:9px;

}


.btn:hover{

    transform:translateY(-2px);

}


.btn-refresh{

    background:#e5f6f1;

    color:#007c60;

}


.btn-dashboard{

    background:#00785b;

    color:white;

}


/* =====================================================
   USER BAR
===================================================== */

.user-bar{

    margin-top:24px;

    background:
    rgba(255,255,255,.12);

    border:
    1px solid
    rgba(255,255,255,.25);

    border-radius:18px;

    min-height:55px;

    padding:0 22px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    color:white;

    font-size:16px;

}


.user-name{

    font-weight:bold;

}


.page-label{

    font-weight:bold;

}


/* =====================================================
   FILTER AREA
===================================================== */

.filter-area{

    background:#f7fbfa;

    margin-top:24px;

    border-radius:24px;

    padding:22px;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.06);

}


/* =====================================================
   SEARCH
===================================================== */

.search-box{

    width:100%;

    position:relative;

}


.search-box i{

    position:absolute;

    left:18px;

    top:50%;

    transform:
    translateY(-50%);

    color:#009875;

    font-size:19px;

}


.search-box input{

    width:100%;

    height:56px;

    border:
    2px solid
    #dcebe7;

    border-radius:16px;

    outline:none;

    padding:
    0 20px 0 52px;

    font-size:16px;

    color:#26332f;

    transition:.2s;

}


.search-box input:focus{

    border-color:#00a27a;

    box-shadow:
    0 0 0 4px
    rgba(0,162,122,.08);

}


/* =====================================================
   FILTER ROW
===================================================== */

.filter-row{

    margin-top:15px;

    display:flex;

    align-items:center;

    justify-content:flex-end;

    gap:10px;

    flex-wrap:wrap;

}


.filter-label{

    font-weight:bold;

    color:#53625d;

    white-space:nowrap;

}


/* =====================================================
   LAST DAYS
===================================================== */

.last-days-box{

    display:flex;

    align-items:center;

    gap:7px;

}


.last-days-box i{

    color:#007e60;

}


.last-days-input{

    width:75px;

    height:42px;

    border:
    2px solid
    #dcebe7;

    border-radius:10px;

    outline:none;

    text-align:center;

    font-size:15px;

    font-weight:bold;

    color:#007b5d;

}


.last-days-input:focus{

    border-color:#009b73;

}


/* =====================================================
   FROM TO DATE
===================================================== */

.date-box{

    display:flex;

    align-items:center;

    gap:6px;

}


.date-box label{

    font-size:13px;

    font-weight:bold;

    color:#68756f;

}


.date-box input{

    width:125px;

    height:42px;

    border:
    2px solid
    #dcebe7;

    border-radius:10px;

    padding:0 8px;

    outline:none;

    font-size:13px;

    color:#40504b;

}


.date-box input:focus{

    border-color:#009b73;

}


/* =====================================================
   FILTER SELECT
===================================================== */

.filter-select{

    height:42px;

    min-width:105px;

    border:
    2px solid
    #dcebe7;

    border-radius:10px;

    padding:0 12px;

    background:white;

    color:#56635f;

    font-size:14px;

    font-weight:bold;

    outline:none;

    cursor:pointer;

}


/* =====================================================
   CLEAR
===================================================== */

.clear-btn{

    height:42px;

    padding:0 15px;

    border:none;

    border-radius:10px;

    background:#e8f6f2;

    color:#007c5e;

    font-weight:bold;

    cursor:pointer;

}


.clear-btn:hover{

    background:#d5eee7;

}


/* =====================================================
   CONTENT CARD
===================================================== */

.content-card{

    background:#f7fbfa;

    margin-top:24px;

    border-radius:26px;

    overflow:hidden;

    min-height:400px;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.06);

}


.content-header{

    padding:
    25px 32px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    border-bottom:
    1px solid
    #e6eeeb;

}


.content-header h2{

    font-size:25px;

    color:#26332f;

}


.pending-count{

    background:#008f6b;

    color:white;

    padding:
    10px 18px;

    border-radius:20px;

    font-weight:bold;

}


/* =====================================================
   TABLE
===================================================== */

.table-wrapper{

    width:100%;

    overflow-x:auto;

}


table{

    width:100%;

    border-collapse:collapse;

    min-width:850px;

}


thead{

    background:#00886a;

    color:white;

}


th{

    padding:16px;

    text-align:left;

    font-size:14px;

}


td{

    padding:17px 16px;

    border-bottom:
    1px solid
    #e6eeeb;

    font-size:14px;

}


tbody tr{

    transition:.2s;

}


tbody tr:hover{

    background:#f0f8f5;

}


.customer-badge{

    display:inline-flex;

    align-items:center;

    gap:7px;

    background:#e6f6f1;

    color:#007b5e;

    padding:
    7px 12px;

    border-radius:9px;

    font-weight:bold;

}


.ref-badge{

    background:#f1f3f5;

    color:#5d6663;

    padding:
    7px 12px;

    border-radius:8px;

    display:inline-block;

}


.view-btn{

    border:none;

    background:#008f6b;

    color:white;

    padding:
    9px 15px;

    border-radius:9px;

    cursor:pointer;

    font-weight:bold;

    display:flex;

    align-items:center;

    gap:7px;

    transition:.2s;

}


.view-btn:hover{

    background:#007657;

    transform:translateY(-1px);

}


/* =====================================================
   EMPTY
===================================================== */

.empty{

    min-height:350px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    text-align:center;

    color:#65736e;

    padding:30px;

}


.empty-icon{

    width:90px;

    height:90px;

    border-radius:50%;

    background:#e7f7f2;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#009b73;

    font-size:38px;

    margin-bottom:20px;

}


.empty h3{

    color:#26322f;

    font-size:24px;

    margin-bottom:8px;

}


/* =====================================================
   LOADING
===================================================== */

.loading{

    min-height:300px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#008f6b;

    font-size:18px;

    font-weight:bold;

}


.spinner{

    width:28px;

    height:28px;

    border:
    4px solid
    #d8eee8;

    border-top-color:#008f6b;

    border-radius:50%;

    animation:
    spin 1s linear infinite;

    margin-right:12px;

}


@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}


/* =====================================================
   MODAL BACKGROUND
===================================================== */

.modal{

    display:none;

    position:fixed;

    inset:0;

    background:
    rgba(0,30,23,.68);

    backdrop-filter:
    blur(5px);

    z-index:9999;

    padding:20px;

    align-items:center;

    justify-content:center;

}


.modal.show{

    display:flex;

}


/* =====================================================
   MODAL BOX
===================================================== */

.modal-box{

    width:100%;

    max-width:780px;

    max-height:92vh;

    overflow-y:auto;

    background:#f4faf8;

    border-radius:26px;

    box-shadow:
    0 25px 70px
    rgba(0,0,0,.3);

    animation:
    modalIn .2s ease;

}


@keyframes modalIn{

    from{

        transform:
        translateY(15px)
        scale(.96);

        opacity:0;

    }

    to{

        transform:
        translateY(0)
        scale(1);

        opacity:1;

    }

}


/* =====================================================
   MODAL HEADER
===================================================== */

.modal-header{

    background:
    linear-gradient(
        135deg,
        #007b5e,
        #00a47c
    );

    color:white;

    padding:20px 24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.modal-header h3{

    font-size:21px;

}


.close-btn{

    width:40px;

    height:40px;

    border:none;

    border-radius:50%;

    background:
    rgba(255,255,255,.18);

    color:white;

    font-size:22px;

    cursor:pointer;

    transition:.2s;

}


.close-btn:hover{

    background:
    rgba(255,255,255,.3);

    transform:rotate(90deg);

}


/* =====================================================
   DETAILS
===================================================== */

.details{

    padding:24px;

}


.detail-grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:15px;

}


/* =====================================================
   READ ONLY DETAIL CARDS
===================================================== */

.detail-item{

    position:relative;

    overflow:hidden;

    border-radius:15px;

    padding:17px;

    border:
    1px solid
    rgba(0,0,0,.04);

    box-shadow:
    0 5px 15px
    rgba(0,60,45,.05);

    min-height:85px;

}


.detail-item::before{

    content:"";

    position:absolute;

    left:0;

    top:0;

    bottom:0;

    width:5px;

}


.detail-item:nth-child(1){

    background:
    linear-gradient(
        135deg,
        #dff7ef,
        #eafbf6
    );

}


.detail-item:nth-child(1)::before{

    background:#009b73;

}


.detail-item:nth-child(2){

    background:
    linear-gradient(
        135deg,
        #e5f0ff,
        #edf5ff
    );

}


.detail-item:nth-child(2)::before{

    background:#3488d8;

}


.detail-item:nth-child(3){

    background:
    linear-gradient(
        135deg,
        #fff3d7,
        #fff8e8
    );

}


.detail-item:nth-child(3)::before{

    background:#f0a22e;

}


.detail-item:nth-child(4){

    background:
    linear-gradient(
        135deg,
        #f0e3ff,
        #f6edff
    );

}


.detail-item:nth-child(4)::before{

    background:#8b62d9;

}


.detail-item:nth-child(5){

    background:
    linear-gradient(
        135deg,
        #dff8f0,
        #eafbf6
    );

}


.detail-item:nth-child(5)::before{

    background:#10a66f;

}


.detail-item:nth-child(6){

    background:
    linear-gradient(
        135deg,
        #fff0e4,
        #fff6ed
    );

}


.detail-item:nth-child(6)::before{

    background:#e58b3d;

}


.detail-item.full{

    grid-column:
    1 / -1;

}


.detail-label{

    font-size:11px;

    color:#66736e;

    font-weight:bold;

    margin-bottom:8px;

    text-transform:uppercase;

    letter-spacing:.5px;

}


.detail-value{

    font-size:15px;

    color:#24332e;

    line-height:1.6;

    word-break:break-word;

    font-weight:600;

}


/* =====================================================
   CALL PERSON / CALL WORK
===================================================== */

.readonly-section{

    margin-top:20px;

    padding-top:20px;

    border-top:
    1px solid
    #dfe9e5;

}


.readonly-box{

    margin-top:10px;

    margin-bottom:18px;

}


.readonly-label{

    display:block;

    font-size:14px;

    font-weight:bold;

    color:#26332f;

    margin-bottom:8px;

}


.readonly-value{

    width:100%;

    min-height:43px;

    padding:
    11px 14px;

    border:
    2px solid
    #d9e7e2;

    border-radius:12px;

    background:
    #f1f6f4;

    color:#007b62;

    font-size:14px;

    font-weight:bold;

    line-height:1.6;

    word-break:break-word;

}


.call-work-value{

    width:100%;

    min-height:85px;

    padding:
    13px 14px;

    border:
    2px solid
    #eadcc8;

    border-radius:12px;

    background:
    #fff8ed;

    color:#7a521d;

    font-size:15px;

    font-weight:500;

    line-height:1.6;

    white-space:pre-wrap;

    word-break:break-word;

}


.modal-actions{

    margin-top:20px;

    display:flex;

    justify-content:flex-end;

}


.cancel-btn{

    border:none;

    padding:
    12px 22px;

    border-radius:11px;

    background:#e9efed;

    color:#52615c;

    font-weight:bold;

    cursor:pointer;

}


.cancel-btn:hover{

    background:#dce6e2;

}


/* =====================================================
   TOAST
===================================================== */

.toast{

    position:fixed;

    right:25px;

    bottom:25px;

    background:#15221e;

    color:white;

    padding:
    14px 20px;

    border-radius:12px;

    display:none;

    z-index:10000;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.2);

}


.toast.show{

    display:block;

}


/* =====================================================
   MOBILE SIDEBAR
===================================================== */

@media(max-width:900px){

    body{

        padding:12px;

    }


    .sidebar{

        width:260px;

        transform:
        translateX(-100%);

    }


    .sidebar.mobile-open{

        transform:
        translateX(0);

    }


    .sidebar.collapsed{

        width:260px;

    }


    .sidebar.collapsed
    .sidebar-logo span,
    .sidebar.collapsed
    .sidebar-link span{

        display:block;

    }


    .sidebar.collapsed
    .sidebar-link{

        justify-content:flex-start;

        padding:
        0 13px;

    }


    body.sidebar-open
    .main-area,
    body.sidebar-collapsed
    .main-area{

        margin-left:0;

    }


    .header{

        flex-direction:column;

        align-items:flex-start;

    }


    .header-buttons{

        width:100%;

    }


    .header-buttons .btn{

        flex:1;

        justify-content:center;

    }


    .user-bar{

        flex-direction:column;

        align-items:flex-start;

        gap:10px;

        padding:15px 18px;

    }


    .filter-row{

        justify-content:flex-start;

    }

}


@media(max-width:600px){

    .header{

        padding:20px;

        border-radius:20px;

    }


    .header-left{

        align-items:flex-start;

    }


    .header-icon{

        width:58px;

        height:58px;

        font-size:25px;

    }


    .header-title h1{

        font-size:25px;

    }


    .header-title p{

        font-size:13px;

    }


    .content-header{

        padding:
        20px;

    }


    .content-header h2{

        font-size:20px;

    }


    .detail-grid{

        grid-template-columns:1fr;

    }


    .detail-item.full{

        grid-column:auto;

    }


    .date-box input{

        width:110px;

    }


    .filter-row{

        flex-direction:column;

        align-items:stretch;

    }


    .last-days-box,
    .date-box{

        width:100%;

    }


    .last-days-input{

        flex:1;

    }


    .date-box input{

        flex:1;

        width:auto;

    }


    .filter-select,
    .clear-btn{

        width:100%;

    }

}


/* =====================================================
   PAGINATION - APP FRIENDLY
===================================================== */
.pagination{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:22px 16px;
    border-top:1px solid #e6eeeb;
    background:#f7fbfa;
    flex-wrap:wrap;
}
.page-btn,
.page-number{
    min-width:42px;
    height:42px;
    padding:0 12px;
    border:1px solid #d8ebe5;
    border-radius:10px;
    background:#ffffff;
    color:#007b5d;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:all .2s ease;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
}
.page-number{padding:0 14px;}
.page-btn:hover:not(:disabled),
.page-number:hover{
    background:#e8f5f1;
    transform:translateY(-1px);
}
.page-number.active{
    background:#008f6b;
    border-color:#008f6b;
    color:#ffffff;
    box-shadow:0 5px 15px rgba(0,143,107,.22);
}
.page-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
    transform:none;
}

<script>


/* =====================================================
   API URL
===================================================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   VARIABLES
===================================================== */

let allData = [];

let selectedItem = null;

let filteredData = [];

const ITEMS_PER_PAGE = 14;

let currentPage = 1;


/* =====================================================
   INIT
===================================================== */

document.addEventListener(

"DOMContentLoaded",

function(){

    loadUser();

    loadData();

    restoreSidebarState();

}

);


/* =====================================================
   SIDEBAR TOGGLE
===================================================== */

function toggleSidebar(){

    const sidebar =
        document.getElementById("sidebar");

    const icon =
        document.querySelector(
            "#sidebarToggle i"
        );


    if(window.innerWidth <= 900){

        sidebar.classList.toggle(
            "mobile-open"
        );

        return;

    }


    sidebar.classList.toggle(
        "collapsed"
    );


    document.body.classList.toggle(
        "sidebar-open"
    );


    document.body.classList.toggle(
        "sidebar-collapsed"
    );


    const collapsed =
        sidebar.classList.contains(
            "collapsed"
        );


    localStorage.setItem(
        "supportSidebarCollapsed",
        collapsed
            ? "true"
            : "false"
    );


    if(collapsed){

        icon.className =
            "fa-solid fa-angles-right";

    }

    else{

        icon.className =
            "fa-solid fa-angles-left";

    }

}


/* =====================================================
   RESTORE SIDEBAR
===================================================== */

function restoreSidebarState(){

    if(window.innerWidth <= 900){

        document.body.classList.remove(
            "sidebar-open"
        );

        document.body.classList.remove(
            "sidebar-collapsed"
        );

        return;

    }


    const collapsed =
        localStorage.getItem(
            "supportSidebarCollapsed"
        );


    const sidebar =
        document.getElementById(
            "sidebar"
        );


    const icon =
        document.querySelector(
            "#sidebarToggle i"
        );


    if(collapsed === "true"){

        sidebar.classList.add(
            "collapsed"
        );

        document.body.classList.remove(
            "sidebar-open"
        );

        document.body.classList.add(
            "sidebar-collapsed"
        );

        icon.className =
            "fa-solid fa-angles-right";

    }

    else{

        sidebar.classList.remove(
            "collapsed"
        );

        document.body.classList.add(
            "sidebar-open"
        );

        document.body.classList.remove(
            "sidebar-collapsed"
        );

        icon.className =
            "fa-solid fa-angles-left";

    }

}


/* =====================================================
   LOAD USER
===================================================== */

/* =====================================================
   LOAD DATA
===================================================== */

async function loadData(){

    const content =

        document.getElementById(

            "content"

        );


    content.className =

        "loading";


    content.innerHTML =

        '<div class="spinner"></div>' +

        'Loading History...';


    try{


        const response =

            await fetch(

                API_URL +

                "?action=history&_=" +

                Date.now(),

                {

                    method:"GET",

                    cache:"no-store"

                }

            );


        const result =

            await response.json();


        if(

            !result.success

        ){

            throw new Error(

                result.message ||

                "Failed to load History."

            );

        }


        allData =

            Array.isArray(

                result.data

            )

            ?

            result.data

            :

            [];


        applyFilters();


    }

    catch(error){


        content.className =

            "empty";


        content.innerHTML =

            '<div class="empty-icon">' +

            '<i class="fa-solid fa-triangle-exclamation"></i>' +

            '</div>' +

            '<h3>Failed to Load</h3>' +

            '<p>' +

            escapeHtml(

                error.message

            ) +

            '</p>';


    }

}


/* =====================================================
   APPLY FILTERS
===================================================== */

function applyFilters(){


    const search =

        document.getElementById(

            "searchInput"

        )

        .value

        .toLowerCase()

        .trim();


    const lastDaysValue =

        document.getElementById(

            "lastDays"

        ).value;


    const lastDays =

        lastDaysValue

        ?

        parseInt(

            lastDaysValue,

            10

        )

        :

        null;


    const fromDate =

        document.getElementById(

            "fromDate"

        ).value;


    const toDate =

        document.getElementById(

            "toDate"

        ).value;


    filteredData =

        allData.filter(

            function(item){


                const searchable =

                (

                    item.customerId ||

                    item.customerNumber ||

                    item.ip ||

                    ""

                ) +

                " " +

                (

                    item.problem ||

                    ""

                ) +

                " " +

                (

                    item.reference ||

                    item.ref ||

                    ""

                ) +

                " " +

                (

                    item.support ||

                    ""

                ) +

                " " +

                (

                    item.supportWork ||

                    ""

                ) +

                " " +

                (

                    item.call ||

                    item.callPerson ||

                    ""

                ) +

                " " +

                (

                    item.callWork ||

                    ""

                );


                if(

                    search &&

                    !searchable

                    .toLowerCase()

                    .includes(search)

                ){

                    return false;

                }


                const itemDate =

                    parseDate(

                        item.date

                    );


                /* =================================================
                   LAST DAYS / OLDER THAN

                   Example:
                   Today = 23-07-2026

                   Last Days = 7

                   Show only records BEFORE
                   the last 7 days.

                   Therefore:
                   23,22,21,20,19,18,17 July
                   are excluded.

                   16 July and older are shown.
                ================================================== */

                if(

                    lastDays !== null &&

                    !isNaN(lastDays) &&

                    lastDays >= 1

                ){


                    if(

                        !itemDate

                    ){

                        return false;

                    }


                    const today =

                        new Date();


                    today.setHours(

                        23,

                        59,

                        59,

                        999

                    );


                    const cutoff =

                        new Date(

                            today

                        );


                    cutoff.setDate(

                        cutoff.getDate() -

                        lastDays

                    );


                    cutoff.setHours(

                        0,

                        0,

                        0,

                        0

                    );


                    if(

                        itemDate >= cutoff

                    ){

                        return false;

                    }

                }


                /* FROM */

                if(

                    fromDate

                ){


                    const from =

                        new Date(

                            fromDate +

                            "T00:00:00"

                        );


                    if(

                        !itemDate ||

                        itemDate < from

                    ){

                        return false;

                    }

                }


                /* TO */

                if(

                    toDate

                ){


                    const to =

                        new Date(

                            toDate +

                            "T23:59:59"

                        );


                    if(

                        !itemDate ||

                        itemDate > to

                    ){

                        return false;

                    }

                }


                return true;


            }

        );


    renderData(

        filteredData

    );

}


/* =====================================================
   RENDER DATA
===================================================== */

function renderData(data){

    const content = document.getElementById("content");

    document.getElementById("pendingCount").textContent =
        data.length + " Records";

    if(data.length === 0){
        content.className = "empty";
        content.innerHTML =
            '<div class="empty-icon"><i class="fa-solid fa-folder-open"></i></div>' +
            '<h3>No History Found</h3>' +
            '<p>No completed support records found.</p>';
        return;
    }

    const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);

    if(currentPage < 1) currentPage = 1;
    if(currentPage > totalPages) currentPage = totalPages;

    const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
    const endIndex = startIndex + ITEMS_PER_PAGE;
    const pageData = data.slice(startIndex, endIndex);

    content.className = "table-wrapper";

    let html =
        '<table>' +
        '<thead><tr>' +
        '<th>Customer ID</th>' +
        '<th>Date</th>' +
        '<th>Problem</th>' +
        '<th>Reference</th>' +
        '<th>Support</th>' +
        '<th>Call</th>' +
        '<th>Action</th>' +
        '</tr></thead><tbody>';

    pageData.forEach(function(item, index){

        const realIndex = startIndex + index;

        html +=
            '<tr>' +
            '<td><span class="customer-badge"><i class="fa-solid fa-user"></i>' +
            escapeHtml(item.customerId || item.customerNumber || item.ip || "") +
            '</span></td>' +
            '<td>' + escapeHtml(formatDateDMY(item.date || "")) + '</td>' +
            '<td>' + escapeHtml(item.problem || "") + '</td>' +
            '<td><span class="ref-badge">' +
            escapeHtml(item.reference || item.ref || "-") +
            '</span></td>' +
            '<td>' + escapeHtml(item.support || "") + '</td>' +
            '<td>' + escapeHtml(item.call || item.callPerson || "") + '</td>' +
            '<td><button class="view-btn" onclick="openModal(' + realIndex + ')">' +
            '<i class="fa-solid fa-eye"></i>View</button></td>' +
            '</tr>';
    });

    html += '</tbody></table>';

    if(totalPages > 1){

        html += '<div class="pagination">';

        html += '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')" ' +
            (currentPage === 1 ? 'disabled' : '') + '>' +
            '<i class="fa-solid fa-chevron-left"></i><span>Previous</span></button>';

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if(endPage - startPage < 4){
            startPage = Math.max(1, endPage - 4);
        }

        for(let i = startPage; i <= endPage; i++){
            html += '<button class="page-number ' + (i === currentPage ? 'active' : '') +
                '" onclick="changePage(' + i + ')">' + i + '</button>';
        }

        html += '<button class="page-btn" onclick="changePage(' + (currentPage + 1) + ')" ' +
            (currentPage === totalPages ? 'disabled' : '') + '>' +
            '<span>Next</span><i class="fa-solid fa-chevron-right"></i></button>';

        html += '</div>';
    }

    content.innerHTML = html;
}

function changePage(page){

    const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);

    if(page < 1 || page > totalPages) return;

    currentPage = page;
    renderData(filteredData);

    const contentCard = document.querySelector('.content-card');
    if(contentCard){
        contentCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

/* =====================================================
   OPEN MODAL
===================================================== */

function openModal(index){


    const data =

        filteredData[index];


    if(

        !data

    ){

        return;

    }


    selectedItem =

        data;


    document.getElementById(

        "mCustomer"

    ).textContent =

        data.customerId ||

        data.customerNumber ||

        data.ip ||

        "";


    document.getElementById(

        "mDate"

    ).textContent =

        formatDateDMY(

            data.date ||

            ""

        );


    document.getElementById(

        "mProblem"

    ).textContent =

        data.problem ||

        "";


    document.getElementById(

        "mReference"

    ).textContent =

        data.reference ||

        data.ref ||

        "-";


    document.getElementById(

        "mSupport"

    ).textContent =

        data.support ||

        "";


    document.getElementById(

        "mSupportWork"

    ).textContent =

        data.supportWork ||

        "";


    document.getElementById(

        "mCallPerson"

    ).textContent =

        data.call ||

        data.callPerson ||

        "Unknown";


    document.getElementById(

        "mCallWork"

    ).textContent =

        data.callWork ||

        "No Call Work Available";


    document.getElementById(

        "callModal"

    ).classList.add(

        "show"

    );

}


/* =====================================================
   CLOSE MODAL
===================================================== */

function closeModal(){


    document.getElementById(

        "callModal"

    ).classList.remove(

        "show"

    );


    selectedItem =

        null;

}


/* =====================================================
   OUTSIDE MODAL
===================================================== */

function outsideModal(event){


    if(

        event.target.id ===

        "callModal"

    ){

        closeModal();

    }

}


/* =====================================================
   DATE FORMAT
===================================================== */

function formatDateDMY(value){


    if(

        !value

    ){

        return "";

    }


    const text =

        String(

            value

        ).trim();


    let match =

        text.match(

            /^(\d{1,2})-(\d{1,2})-(\d{4})(.*)$/

        );


    if(

        match

    ){

        return (

            String(

                match[1]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            String(

                match[2]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            match[3] +

            match[4]

        );

    }


    match =

        text.match(

            /^(\d{1,2})\/(\d{1,2})\/(\d{4})(.*)$/

        );


    if(

        match

    ){

        return (

            String(

                match[2]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            String(

                match[1]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            match[3] +

            match[4]

        );

    }


    match =

        text.match(

            /^(\d{4})-(\d{1,2})-(\d{1,2})(.*)$/

        );


    if(

        match

    ){

        return (

            String(

                match[3]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            String(

                match[2]

            ).padStart(

                2,

                "0"

            ) +

            "-" +

            match[1] +

            match[4]

        );

    }


    return text;

}


/* =====================================================
   PARSE DATE
===================================================== */

function parseDate(value){


    if(

        !value

    ){

        return null;

    }


    const text =

        String(

            value

        ).trim();


    let match =

        text.match(

            /^(\d{1,2})-(\d{1,2})-(\d{4})/

        );


    if(

        match

    ){

        const date =

            new Date(

                Number(

                    match[3]

                ),

                Number(

                    match[2]

                ) - 1,

                Number(

                    match[1]

                )

            );


        return isNaN(

            date.getTime()

        )

        ?

        null

        :

        date;

    }


    match =

        text.match(

            /^(\d{1,2})\/(\d{1,2})\/(\d{4})/

        );


    if(

        match

    ){

        const date =

            new Date(

                Number(

                    match[3]

                ),

                Number(

                    match[1]

                ) - 1,

                Number(

                    match[2]

                )

            );


        return isNaN(

            date.getTime()

        )

        ?

        null

        :

        date;

    }


    match =

        text.match(

            /^(\d{4})-(\d{1,2})-(\d{1,2})/

        );


    if(

        match

    ){

        const date =

            new Date(

                Number(

                    match[1]

                ),

                Number(

                    match[2]

                ) - 1,

                Number(

                    match[3]

                )

            );


        return isNaN(

            date.getTime()

        )

        ?

        null

        :

        date;

    }


    const date =

        new Date(

            text

        );


    return isNaN(

        date.getTime()

    )

    ?

    null

    :

    date;

}


/* =====================================================
   CLEAR FILTERS
===================================================== */

function clearFilters(){


    document.getElementById(

        "searchInput"

    ).value = "";


    document.getElementById(

        "lastDays"

    ).value = "";


    document.getElementById(

        "fromDate"

    ).value = "";


    document.getElementById(

        "toDate"

    ).value = "";


    document.getElementById(

        "statusFilter"

    ).value =

        "all";


    applyFilters();

}


/* =====================================================
   TOAST
===================================================== */

function showToast(message){


    const toast =

        document.getElementById(

            "toast"

        );


    toast.textContent =

        message;


    toast.classList.add(

        "show"

    );


    setTimeout(

        function(){

            toast.classList.remove(

                "show"

            );

        },

        3000

    );

}


/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHtml(value){


    return String(

        value ||

        ""

    )

    .replace(

        /&/g,

        "&amp;"

    )

    .replace(

        /</g,

        "&lt;"

    )

    .replace(

        />/g,

        "&gt;"

    )

    .replace(

        /"/g,

        "&quot;"

    )

    .replace(

        /'/g,

        "&#039;"

    );

}


/* =====================================================
   ESC KEY
===================================================== */

document.addEventListener(

"keydown",

function(event){


    if(

        event.key ===

        "Escape"

    ){

        closeModal();

    }

}

);


/* =====================================================
   MOBILE SIDEBAR CLOSE
===================================================== */

document.addEventListener(

"click",

function(event){

    if(window.innerWidth > 900){

        return;

    }


    const sidebar =
        document.getElementById(
            "sidebar"
        );


    if(

        sidebar.classList.contains(
            "mobile-open"
        )

        &&

        !sidebar.contains(
            event.target
        )

    ){

        sidebar.classList.remove(
            "mobile-open"
        );

    }

}

);


/* =====================================================
   RESIZE
===================================================== */

window.addEventListener(

"resize",

function(){

    restoreSidebarState();

}

);
