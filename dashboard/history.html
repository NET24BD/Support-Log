<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Log History</title>

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<style>

/* =====================================================
   RESET
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}


/* =====================================================
   BODY
===================================================== */

body{

  font-family:
  Arial,
  Helvetica,
  sans-serif;

  background:
  linear-gradient(
    135deg,
    #005b45,
    #007d61,
    #008f6d
  );

  min-height:100vh;

  padding:16px 24px;

  color:#14201d;

}


/* =====================================================
   CONTAINER
===================================================== */

.container{

  width:100%;

  max-width:1500px;

  margin:auto;

}


/* =====================================================
   HEADER
===================================================== */

.header{

  background:#f7fbfa;

  border-radius:26px;

  min-height:122px;

  padding:24px 30px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  gap:20px;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.08);

}


.header-left{

  display:flex;

  align-items:center;

  gap:20px;

}


.header-icon{

  width:74px;

  height:74px;

  border-radius:20px;

  background:#009b73;

  color:white;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:34px;

  box-shadow:
  0 10px 20px
  rgba(0,120,90,.25);

}


.header-title h1{

  font-size:32px;

  color:#00765b;

  margin-bottom:5px;

}


.header-title p{

  font-size:16px;

  color:#66736f;

}


.header-buttons{

  display:flex;

  gap:12px;

}


.btn{

  border:none;

  border-radius:15px;

  padding:14px 22px;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

  transition:.2s;

  display:flex;

  align-items:center;

  gap:9px;

}


.btn:hover{

  transform:translateY(-2px);

}


.btn-refresh{

  background:#e5f6f1;

  color:#007c60;

}


.btn-dashboard{

  background:#00785b;

  color:white;

}


/* =====================================================
   USER BAR
===================================================== */

.user-bar{

  margin-top:24px;

  background:
  rgba(255,255,255,.12);

  border:
  1px solid
  rgba(255,255,255,.25);

  border-radius:18px;

  min-height:55px;

  padding:0 22px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  color:white;

  font-size:16px;

}


.user-name{

  font-weight:bold;

}


.page-label{

  font-weight:bold;

}


/* =====================================================
   FILTER AREA
===================================================== */

.filter-area{

  background:#f7fbfa;

  margin-top:24px;

  border-radius:24px;

  padding:22px;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.06);

}


/* =====================================================
   SEARCH
===================================================== */

.search-box{

  width:100%;

  position:relative;

}


.search-box i{

  position:absolute;

  left:18px;

  top:50%;

  transform:
  translateY(-50%);

  color:#009875;

  font-size:19px;

}


.search-box input{

  width:100%;

  height:56px;

  border:
  2px solid
  #dcebe7;

  border-radius:16px;

  outline:none;

  padding:
  0 20px 0 52px;

  font-size:16px;

  color:#26332f;

  transition:.2s;

}


.search-box input:focus{

  border-color:#00a27a;

  box-shadow:
  0 0 0 4px
  rgba(0,162,122,.08);

}


/* =====================================================
   FILTER ROW
===================================================== */

.filter-row{

  margin-top:15px;

  display:flex;

  align-items:center;

  justify-content:flex-end;

  gap:10px;

  flex-wrap:wrap;

}


.filter-label{

  font-weight:bold;

  color:#53625d;

  white-space:nowrap;

}


.last-days-box{

  display:flex;

  align-items:center;

  gap:7px;

}


.last-days-box i{

  color:#007e60;

}


.last-days-input{

  width:75px;

  height:42px;

  border:
  2px solid
  #dcebe7;

  border-radius:10px;

  outline:none;

  text-align:center;

  font-size:15px;

  font-weight:bold;

  color:#007b5d;

}


.date-box{

  display:flex;

  align-items:center;

  gap:6px;

}


.date-box label{

  font-size:13px;

  font-weight:bold;

  color:#68756f;

}


.date-box input{

  width:115px;

  height:42px;

  border:
  2px solid
  #dcebe7;

  border-radius:10px;

  padding:0 8px;

  outline:none;

  font-size:13px;

  color:#40504b;

}


.filter-select{

  height:42px;

  min-width:105px;

  border:
  2px solid
  #dcebe7;

  border-radius:10px;

  padding:0 12px;

  background:white;

  color:#56635f;

  font-size:14px;

  font-weight:bold;

  outline:none;

  cursor:pointer;

}


.clear-btn{

  height:42px;

  padding:0 15px;

  border:none;

  border-radius:10px;

  background:#e8f6f2;

  color:#007c5e;

  font-weight:bold;

  cursor:pointer;

}


/* =====================================================
   CONTENT CARD
===================================================== */

.content-card{

  background:#f7fbfa;

  margin-top:24px;

  border-radius:26px;

  overflow:hidden;

  min-height:400px;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.06);

}


.content-header{

  padding:
  25px 32px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  border-bottom:
  1px solid
  #e6eeeb;

}


.content-header h2{

  font-size:25px;

}


.pending-count{

  background:#008f6b;

  color:white;

  padding:
  10px 18px;

  border-radius:20px;

  font-weight:bold;

}


/* =====================================================
   TABLE
===================================================== */

.table-wrapper{

  width:100%;

  overflow-x:auto;

}


table{

  width:100%;

  border-collapse:collapse;

  min-width:700px;

}


thead{

  background:#00886a;

  color:white;

}


th{

  padding:16px;

  text-align:left;

  font-size:14px;

}


td{

  padding:17px 16px;

  border-bottom:
  1px solid
  #e6eeeb;

  font-size:14px;

}


tbody tr{

  transition:.2s;

}


tbody tr:hover{

  background:#f0f8f5;

  transform:scale(1.001);

}


.customer-badge{

  display:inline-flex;

  align-items:center;

  gap:7px;

  background:#e6f6f1;

  color:#007b5e;

  padding:
  7px 12px;

  border-radius:9px;

  font-weight:bold;

}


.ref-badge{

  background:#f1f3f5;

  color:#5d6663;

  padding:
  7px 12px;

  border-radius:8px;

  display:inline-block;

}


.view-btn{

  border:none;

  background:#008f6b;

  color:white;

  padding:
  9px 16px;

  border-radius:9px;

  cursor:pointer;

  font-weight:bold;

  display:flex;

  align-items:center;

  gap:7px;

  transition:.2s;

}


.view-btn:hover{

  background:#006f55;

  transform:translateY(-1px);

  box-shadow:
  0 5px 12px
  rgba(0,100,75,.2);

}


/* =====================================================
   EMPTY
===================================================== */

.empty{

  min-height:350px;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  text-align:center;

  color:#65736e;

}


.empty-icon{

  width:90px;

  height:90px;

  border-radius:50%;

  background:#e7f7f2;

  display:flex;

  align-items:center;

  justify-content:center;

  color:#009b73;

  font-size:38px;

  margin-bottom:20px;

}


.empty h3{

  color:#26322f;

  font-size:24px;

  margin-bottom:8px;

}


/* =====================================================
   LOADING
===================================================== */

.loading{

  min-height:300px;

  display:flex;

  align-items:center;

  justify-content:center;

  color:#008f6b;

  font-size:18px;

  font-weight:bold;

}


.spinner{

  width:28px;

  height:28px;

  border:
  4px solid
  #d8eee8;

  border-top-color:#008f6b;

  border-radius:50%;

  animation:
  spin 1s linear infinite;

  margin-right:12px;

}


@keyframes spin{

  to{

    transform:rotate(360deg);

  }

}


/* =====================================================
   MODAL BACKGROUND
===================================================== */

.modal{

  display:none;

  position:fixed;

  inset:0;

  background:
  rgba(0,35,27,.68);

  backdrop-filter:
  blur(5px);

  z-index:9999;

  padding:20px;

  align-items:center;

  justify-content:center;

}


.modal.show{

  display:flex;

}


/* =====================================================
   MODAL BOX
===================================================== */

.modal-box{

  width:100%;

  max-width:820px;

  max-height:92vh;

  overflow-y:auto;

  background:#f4faf8;

  border-radius:26px;

  box-shadow:
  0 30px 90px
  rgba(0,0,0,.35);

  animation:
  modalIn .22s ease;

}


@keyframes modalIn{

  from{

    transform:
    translateY(15px)
    scale(.96);

    opacity:0;

  }

  to{

    transform:
    translateY(0)
    scale(1);

    opacity:1;

  }

}


/* =====================================================
   MODAL HEADER
===================================================== */

.modal-header{

  background:
  linear-gradient(
    135deg,
    #007d61,
    #009b73
  );

  color:white;

  padding:22px 25px;

  display:flex;

  justify-content:space-between;

  align-items:center;

}


.modal-header h3{

  font-size:21px;

  display:flex;

  align-items:center;

  gap:10px;

}


.close-btn{

  width:40px;

  height:40px;

  border:none;

  border-radius:50%;

  background:
  rgba(255,255,255,.18);

  color:white;

  font-size:22px;

  cursor:pointer;

  transition:.2s;

}


.close-btn:hover{

  background:
  rgba(255,255,255,.35);

  transform:rotate(90deg);

}


/* =====================================================
   DETAILS
===================================================== */

.details{

  padding:25px;

}


.detail-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:16px;

}


/* =====================================================
   DETAIL CARD BASE
===================================================== */

.detail-item{

  position:relative;

  overflow:hidden;

  background:white;

  border:
  1px solid
  #dcebe6;

  border-radius:16px;

  padding:17px 18px;

  box-shadow:
  0 5px 15px
  rgba(0,70,50,.05);

  transition:.2s;

}


.detail-item:hover{

  transform:translateY(-2px);

  box-shadow:
  0 8px 22px
  rgba(0,70,50,.09);

}


.detail-item::before{

  content:"";

  position:absolute;

  left:0;

  top:0;

  bottom:0;

  width:5px;

  background:#009b73;

}


/* =====================================================
   DIFFERENT DETAIL COLORS
===================================================== */

/* CUSTOMER */

.detail-item.customer-card{

  background:
  linear-gradient(
    135deg,
    #effcf8,
    #ffffff
  );

}


.detail-item.customer-card::before{

  background:#00a77d;

}


/* DATE */

.detail-item.date-card{

  background:
  linear-gradient(
    135deg,
    #f1f7ff,
    #ffffff
  );

}


.detail-item.date-card::before{

  background:#4385d7;

}


/* PROBLEM */

.detail-item.problem-card{

  background:
  linear-gradient(
    135deg,
    #fff8ec,
    #ffffff
  );

}


.detail-item.problem-card::before{

  background:#f0a52b;

}


/* REFERENCE */

.detail-item.reference-card{

  background:
  linear-gradient(
    135deg,
    #f7f1ff,
    #ffffff
  );

}


.detail-item.reference-card::before{

  background:#8b5bd6;

}


/* SUPPORT */

.detail-item.support-card{

  background:
  linear-gradient(
    135deg,
    #edfbff,
    #ffffff
  );

}


.detail-item.support-card::before{

  background:#18a9c9;

}


/* SUPPORT WORK */

.detail-item.support-work-card{

  background:
  linear-gradient(
    135deg,
    #f0fff4,
    #ffffff
  );

}


.detail-item.support-work-card::before{

  background:#36a852;

}


/* CALL PERSON */

.detail-item.call-person-card{

  background:
  linear-gradient(
    135deg,
    #fff0f6,
    #ffffff
  );

}


.detail-item.call-person-card::before{

  background:#e84f91;

}


/* CALL WORK */

.detail-item.call-work-card{

  background:
  linear-gradient(
    135deg,
    #fff4ed,
    #ffffff
  );

}


.detail-item.call-work-card::before{

  background:#f2763e;

}


/* FULL */

.detail-item.full{

  grid-column:
  1 / -1;

}


/* =====================================================
   DETAIL LABEL
===================================================== */

.detail-label{

  font-size:11px;

  color:#71807a;

  font-weight:bold;

  margin-bottom:8px;

  text-transform:uppercase;

  letter-spacing:.5px;

  display:flex;

  align-items:center;

  gap:7px;

}


/* =====================================================
   DETAIL VALUE
===================================================== */

.detail-value{

  font-size:16px;

  color:#24332e;

  line-height:1.6;

  word-break:break-word;

  font-weight:600;

}


.detail-value:empty::after{

  content:"Not available";

  color:#9aa7a2;

  font-weight:normal;

  font-style:italic;

}


/* =====================================================
   MODAL ACTIONS
===================================================== */

.modal-actions{

  margin-top:22px;

  padding-top:20px;

  border-top:
  1px solid
  #dce9e5;

  display:flex;

  justify-content:flex-end;

}


.close-detail-btn{

  border:none;

  padding:
  12px 22px;

  border-radius:11px;

  background:#007d61;

  color:white;

  font-weight:bold;

  cursor:pointer;

  display:flex;

  align-items:center;

  gap:8px;

  transition:.2s;

}


.close-detail-btn:hover{

  background:#00664f;

  transform:translateY(-1px);

}


/* =====================================================
   TOAST
===================================================== */

.toast{

  position:fixed;

  right:25px;

  bottom:25px;

  background:#15221e;

  color:white;

  padding:
  14px 20px;

  border-radius:12px;

  display:none;

  z-index:10000;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.2);

}


.toast.show{

  display:block;

}


/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:900px){

  body{

    padding:12px;

  }


  .header{

    flex-direction:column;

    align-items:flex-start;

  }


  .header-buttons{

    width:100%;

  }


  .header-buttons .btn{

    flex:1;

    justify-content:center;

  }


  .user-bar{

    flex-direction:column;

    align-items:flex-start;

    gap:10px;

    padding:15px 18px;

  }


  .filter-row{

    justify-content:flex-start;

  }

}


@media(max-width:600px){

  .header{

    padding:20px;

    border-radius:20px;

  }


  .header-left{

    align-items:flex-start;

  }


  .header-icon{

    width:58px;

    height:58px;

    font-size:25px;

  }


  .header-title h1{

    font-size:25px;

  }


  .header-title p{

    font-size:13px;

  }


  .content-header{

    padding:20px;

  }


  .content-header h2{

    font-size:20px;

  }


  .detail-grid{

    grid-template-columns:1fr;

  }


  .detail-item.full{

    grid-column:auto;

  }


  .details{

    padding:18px;

  }


  .modal{

    padding:10px;

  }


  .modal-box{

    border-radius:20px;

  }


  .modal-header{

    padding:18px;

  }


  .date-box input{

    width:105px;

  }

}

</style>

</head>


<body>


<div class="container">


<!-- ===================================================
     HEADER
=================================================== -->

<div class="header">

  <div class="header-left">

    <div class="header-icon">

      <i class="fa-solid fa-clock-rotate-left"></i>

    </div>

    <div class="header-title">

      <h1>HISTORY</h1>

      <p>
        View and manage all completed Support Log records
      </p>

    </div>

  </div>


  <div class="header-buttons">

    <button
      class="btn btn-refresh"
      onclick="loadData()"
    >

      <i class="fa-solid fa-rotate"></i>

      Refresh

    </button>


    <button
      class="btn btn-dashboard"
      onclick="goDashboard()"
    >

      <i class="fa-solid fa-arrow-left"></i>

      Dashboard

    </button>

  </div>

</div>


<!-- ===================================================
     USER BAR
=================================================== -->

<div class="user-bar">

  <div>

    <i class="fa-solid fa-user"></i>

    Logged in as:

    <span
      class="user-name"
      id="loggedUser"
    >
      User
    </span>

  </div>


  <div class="page-label">

    <i class="fa-solid fa-clock-rotate-left"></i>

    Support Log History

  </div>

</div>


<!-- ===================================================
     FILTER AREA
=================================================== -->

<div class="filter-area">


  <!-- SEARCH -->

  <div class="search-box">

    <i class="fa-solid fa-magnifying-glass"></i>

    <input
      type="text"
      id="searchInput"
      placeholder="Search Customer ID, Problem, Reference, Support, Call..."
      oninput="applyFilters()"
    >

  </div>


  <!-- FILTER ROW -->

  <div class="filter-row">


    <!-- LAST DAYS -->

    <div class="last-days-box">

      <i class="fa-regular fa-calendar"></i>

      <span class="filter-label">
        Last Days
      </span>

      <input
        type="number"
        id="lastDays"
        class="last-days-input"
        min="1"
        placeholder="All"
        oninput="applyFilters()"
      >

    </div>


    <!-- FROM -->

    <div class="date-box">

      <label>
        From
      </label>

      <input
        type="date"
        id="fromDate"
        onchange="applyFilters()"
      >

    </div>


    <!-- TO -->

    <div class="date-box">

      <label>
        To
      </label>

      <input
        type="date"
        id="toDate"
        onchange="applyFilters()"
      >

    </div>


    <!-- STATUS -->

    <select
      id="statusFilter"
      class="filter-select"
      onchange="applyFilters()"
    >

      <option value="all">
        All
      </option>

    </select>


    <!-- CLEAR -->

    <button
      class="clear-btn"
      onclick="clearFilters()"
    >

      <i class="fa-solid fa-filter-circle-xmark"></i>

      Clear

    </button>

  </div>

</div>


<!-- ===================================================
     CONTENT
=================================================== -->

<div class="content-card">


  <div class="content-header">

    <h2>
      Support Log History
    </h2>


    <div
      class="pending-count"
      id="pendingCount"
    >
      0 Records
    </div>

  </div>


  <div
    id="content"
    class="loading"
  >

    <div class="spinner"></div>

    Loading History...

  </div>


</div>


</div>


<!-- ===================================================
     VIEW MODAL
=================================================== -->

<div
  class="modal"
  id="viewModal"
  onclick="outsideModal(event)"
>


  <div class="modal-box">


    <!-- MODAL HEADER -->

    <div class="modal-header">

      <h3>

        <i class="fa-solid fa-circle-info"></i>

        Support Log Details

      </h3>


      <button
        class="close-btn"
        onclick="closeModal()"
      >

        <i class="fa-solid fa-xmark"></i>

      </button>

    </div>


    <!-- DETAILS -->

    <div class="details">


      <div class="detail-grid">


        <!-- CUSTOMER -->

        <div class="detail-item customer-card">

          <div class="detail-label">

            <i class="fa-solid fa-user"></i>

            Customer ID

          </div>

          <div
            class="detail-value"
            id="mCustomer"
          ></div>

        </div>


        <!-- DATE -->

        <div class="detail-item date-card">

          <div class="detail-label">

            <i class="fa-regular fa-calendar"></i>

            Date

          </div>

          <div
            class="detail-value"
            id="mDate"
          ></div>

        </div>


        <!-- PROBLEM -->

        <div class="detail-item problem-card full">

          <div class="detail-label">

            <i class="fa-solid fa-triangle-exclamation"></i>

            Problem

          </div>

          <div
            class="detail-value"
            id="mProblem"
          ></div>

        </div>


        <!-- REFERENCE -->

        <div class="detail-item reference-card">

          <div class="detail-label">

            <i class="fa-solid fa-link"></i>

            Reference

          </div>

          <div
            class="detail-value"
            id="mReference"
          ></div>

        </div>


        <!-- SUPPORT -->

        <div class="detail-item support-card">

          <div class="detail-label">

            <i class="fa-solid fa-headset"></i>

            Support

          </div>

          <div
            class="detail-value"
            id="mSupport"
          ></div>

        </div>


        <!-- SUPPORT WORK -->

        <div class="detail-item support-work-card full">

          <div class="detail-label">

            <i class="fa-solid fa-screwdriver-wrench"></i>

            Support Work

          </div>

          <div
            class="detail-value"
            id="mSupportWork"
          ></div>

        </div>


        <!-- CALL PERSON -->

        <div class="detail-item call-person-card">

          <div class="detail-label">

            <i class="fa-solid fa-phone"></i>

            Call Person

          </div>

          <div
            class="detail-value"
            id="mCallPerson"
          ></div>

        </div>


        <!-- CALL WORK -->

        <div class="detail-item call-work-card full">

          <div class="detail-label">

            <i class="fa-solid fa-phone-volume"></i>

            Call Work

          </div>

          <div
            class="detail-value"
            id="mCallWork"
          ></div>

        </div>


      </div>


      <!-- CLOSE -->

      <div class="modal-actions">

        <button
          class="close-detail-btn"
          onclick="closeModal()"
        >

          <i class="fa-solid fa-check"></i>

          Close

        </button>

      </div>


    </div>


  </div>

</div>


<!-- ===================================================
     TOAST
=================================================== -->

<div
  class="toast"
  id="toast"
></div>


<script>


/* =====================================================
   API URL
===================================================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   VARIABLES
===================================================== */

let allData = [];

let filteredData = [];

let selectedItem = null;


/* =====================================================
   INIT
===================================================== */

document.addEventListener(
  "DOMContentLoaded",
  function(){

    loadUser();

    loadData();

  }
);


/* =====================================================
   LOAD USER
===================================================== */

function loadUser(){

  const username =

    localStorage.getItem("username") ||

    localStorage.getItem("userName") ||

    localStorage.getItem("name") ||

    sessionStorage.getItem("username") ||

    "User";


  document.getElementById(
    "loggedUser"
  ).textContent = username;

}


/* =====================================================
   LOAD HISTORY DATA
===================================================== */

async function loadData(){

  const content =
    document.getElementById(
      "content"
    );


  content.className =
    "loading";


  content.innerHTML =

    '<div class="spinner"></div>' +

    'Loading History...';


  try{


    const response =
      await fetch(

        API_URL +
        "?action=history&_=" +
        Date.now(),

        {

          method:"GET",

          cache:"no-store"

        }

      );


    const result =
      await response.json();


    if(
      !result.success
    ){

      throw new Error(

        result.message ||

        "Failed to load history."

      );

    }


    allData =

      Array.isArray(
        result.data
      )

      ? result.data

      : [];


    applyFilters();


  }catch(error){


    content.className =
      "empty";


    content.innerHTML =

      '<div class="empty-icon">' +

      '<i class="fa-solid fa-triangle-exclamation"></i>' +

      '</div>' +

      '<h3>Failed to Load</h3>' +

      '<p>' +

      escapeHtml(
        error.message
      ) +

      '</p>';

  }

}


/* =====================================================
   APPLY FILTERS
===================================================== */

function applyFilters(){

  const search =

    document.getElementById(
      "searchInput"
    )
    .value
    .toLowerCase()
    .trim();


  const lastDaysValue =

    document.getElementById(
      "lastDays"
    ).value;


  const lastDays =

    lastDaysValue

    ? parseInt(
        lastDaysValue,
        10
      )

    : null;


  const fromDate =

    document.getElementById(
      "fromDate"
    ).value;


  const toDate =

    document.getElementById(
      "toDate"
    ).value;


  filteredData =

    allData.filter(

      function(item){


        const searchable =

          (

            item.customerId ||

            item.customerNumber ||

            item.ip ||

            ""

          ) +

          " " +

          (

            item.date ||

            ""

          ) +

          " " +

          (

            item.problem ||

            ""

          ) +

          " " +

          (

            item.reference ||

            item.ref ||

            ""

          ) +

          " " +

          (

            item.support ||

            ""

          ) +

          " " +

          (

            item.supportWork ||

            ""

          ) +

          " " +

          (

            item.call ||

            item.callPerson ||

            ""

          ) +

          " " +

          (

            item.callWork ||

            ""

          );


        if(

          search &&

          !searchable
          .toLowerCase()
          .includes(search)

        ){

          return false;

        }


        const itemDate =

          parseDate(
            item.date
          );


        /* LAST DAYS */

        if(
          lastDays !== null &&
          !isNaN(lastDays)
        ){

          if(
            !itemDate
          ){

            return false;

          }


          const today =
            new Date();


          today.setHours(
            23,
            59,
            59,
            999
          );


          const start =
            new Date(
              today
            );


          start.setDate(

            start.getDate()
            -
            (
              lastDays - 1
            )

          );


          if(

            itemDate < start ||

            itemDate > today

          ){

            return false;

          }

        }


        /* FROM DATE */

        if(
          fromDate
        ){

          const from =

            new Date(

              fromDate +
              "T00:00:00"

            );


          if(

            !itemDate ||

            itemDate < from

          ){

            return false;

          }

        }


        /* TO DATE */

        if(
          toDate
        ){

          const to =

            new Date(

              toDate +
              "T23:59:59"

            );


          if(

            !itemDate ||

            itemDate > to

          ){

            return false;

          }

        }


        return true;


      }

    );


  renderData(
    filteredData
  );

}


/* =====================================================
   RENDER TABLE
===================================================== */

function renderData(data){

  const content =

    document.getElementById(
      "content"
    );


  document.getElementById(
    "pendingCount"
  ).textContent =

    data.length +

    " Records";


  if(
    data.length === 0
  ){

    content.className =
      "empty";


    content.innerHTML =

      '<div class="empty-icon">' +

      '<i class="fa-solid fa-folder-open"></i>' +

      '</div>' +

      '<h3>No History Found</h3>' +

      '<p>There are no records matching your search.</p>';


    return;

  }


  content.className =
    "table-wrapper";


  let html =

    '<table>' +

    '<thead>' +

    '<tr>' +

    '<th>Customer ID</th>' +

    '<th>Date</th>' +

    '<th>Problem</th>' +

    '<th>Reference</th>' +

    '<th>Support</th>' +

    '<th>Call Person</th>' +

    '<th>Action</th>' +

    '</tr>' +

    '</thead>' +

    '<tbody>';


  data.forEach(

    function(item,index){


      html +=

        '<tr>' +


        '<td>' +

        '<span class="customer-badge">' +

        '<i class="fa-solid fa-user"></i>' +

        escapeHtml(

          item.customerId ||

          item.customerNumber ||

          item.ip ||

          "-"

        ) +

        '</span>' +

        '</td>' +


        '<td>' +

        escapeHtml(

          item.date ||

          "-"

        ) +

        '</td>' +


        '<td>' +

        escapeHtml(

          item.problem ||

          "-"

        ) +

        '</td>' +


        '<td>' +

        '<span class="ref-badge">' +

        escapeHtml(

          item.reference ||

          item.ref ||

          "-"

        ) +

        '</span>' +

        '</td>' +


        '<td>' +

        escapeHtml(

          item.support ||

          "-"

        ) +

        '</td>' +


        '<td>' +

        escapeHtml(

          item.call ||

          item.callPerson ||

          "-"

        ) +

        '</td>' +


        '<td>' +

        '<button ' +

        'class="view-btn" ' +

        'onclick="openModal(' +

        index +

        ')">' +

        '<i class="fa-solid fa-eye"></i>' +

        'View' +

        '</button>' +

        '</td>' +


        '</tr>';

    }

  );


  html +=

    '</tbody>' +

    '</table>';


  content.innerHTML =
    html;

}


/* =====================================================
   OPEN VIEW MODAL
===================================================== */

function openModal(index){

  const data =
    filteredData[index];


  if(
    !data
  ){

    return;

  }


  selectedItem =
    data;


  document.getElementById(
    "mCustomer"
  ).textContent =

    data.customerId ||

    data.customerNumber ||

    data.ip ||

    "-";


  document.getElementById(
    "mDate"
  ).textContent =

    data.date ||

    "-";


  document.getElementById(
    "mProblem"
  ).textContent =

    data.problem ||

    "-";


  document.getElementById(
    "mReference"
  ).textContent =

    data.reference ||

    data.ref ||

    "-";


  document.getElementById(
    "mSupport"
  ).textContent =

    data.support ||

    "-";


  document.getElementById(
    "mSupportWork"
  ).textContent =

    data.supportWork ||

    "-";


  document.getElementById(
    "mCallPerson"
  ).textContent =

    data.call ||

    data.callPerson ||

    "-";


  document.getElementById(
    "mCallWork"
  ).textContent =

    data.callWork ||

    "-";


  document.getElementById(
    "viewModal"
  ).classList.add(
    "show"
  );

}


/* =====================================================
   CLOSE MODAL
===================================================== */

function closeModal(){

  document.getElementById(
    "viewModal"
  ).classList.remove(
    "show"
  );


  selectedItem =
    null;

}


/* =====================================================
   OUTSIDE MODAL
===================================================== */

function outsideModal(event){

  if(

    event.target.id ===
    "viewModal"

  ){

    closeModal();

  }

}


/* =====================================================
   PARSE DATE
===================================================== */

function parseDate(value){

  if(
    !value
  ){

    return null;

  }


  const text =

    String(value)
    .trim();


  /* DD-MM-YYYY */

  let match =

    text.match(

      /^(\d{1,2})-(\d{1,2})-(\d{4})/

    );


  if(
    match
  ){

    return new Date(

      Number(match[3]),

      Number(match[2]) - 1,

      Number(match[1])

    );

  }


  /* DD/MM/YYYY */

  match =

    text.match(

      /^(\d{1,2})\/(\d{1,2})\/(\d{4})/

    );


  if(
    match
  ){

    return new Date(

      Number(match[3]),

      Number(match[2]) - 1,

      Number(match[1])

    );

  }


  const date =

    new Date(
      text
    );


  return isNaN(
    date.getTime()
  )

  ? null

  : date;

}


/* =====================================================
   CLEAR FILTERS
===================================================== */

function clearFilters(){

  document.getElementById(
    "searchInput"
  ).value = "";


  document.getElementById(
    "lastDays"
  ).value = "";


  document.getElementById(
    "fromDate"
  ).value = "";


  document.getElementById(
    "toDate"
  ).value = "";


  document.getElementById(
    "statusFilter"
  ).value =
    "all";


  applyFilters();

}


/* =====================================================
   DASHBOARD
===================================================== */

function goDashboard(){

  if(
    document.referrer
  ){

    history.back();

  }else{

    window.location.href =
      "dashboard.html";

  }

}


/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =

    document.getElementById(
      "toast"
    );


  toast.textContent =
    message;


  toast.classList.add(
    "show"
  );


  setTimeout(

    function(){

      toast.classList.remove(
        "show"
      );

    },

    3000

  );

}


/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHtml(value){

  return String(
    value || ""
  )

  .replace(
    /&/g,
    "&amp;"
  )

  .replace(
    /</g,
    "&lt;"
  )

  .replace(
    />/g,
    "&gt;"
  )

  .replace(
    /"/g,
    "&quot;"
  )

  .replace(
    /'/g,
    "&#039;"
  );

}


/* =====================================================
   ESC KEY
===================================================== */

document.addEventListener(

  "keydown",

  function(event){

    if(
      event.key ===
      "Escape"
    ){

      closeModal();

    }

  }

);

</script>

</body>
</html>
