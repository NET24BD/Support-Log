(function(){

    if(
        localStorage.getItem("loggedIn") !== "true"
    ){

        window.location.replace(
            "../index.html"
        );

    }

})();

</script>

<style>

/* RESET */

*{

margin:0;
padding:0;
box-sizing:border-box;

font-family:'Poppins',sans-serif;

}


/* BODY */

body{

background:#005C3A;

min-height:100vh;

overflow-x:hidden;

position:relative;

}


/* BACKGROUND */

.bg{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-1;

}


.circle1{

position:absolute;

width:700px;
height:700px;

background:#E53935;

border-radius:50%;

left:50%;
top:50%;

transform:translate(-50%,-50%);

filter:blur(140px);

opacity:.35;

}


.circle2{

position:absolute;

width:260px;
height:260px;

background:#0D8F5A;

border-radius:50%;

left:-120px;
top:-120px;

filter:blur(90px);

}


.circle3{

position:absolute;

width:300px;
height:300px;

background:#0D8F5A;

border-radius:50%;

right:-120px;
bottom:-120px;

filter:blur(90px);

}


/* HEADER */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px 40px;

}


/* BACK BUTTON */

.back{

background:#fff;

color:#006A4E;

padding:12px 20px;

border-radius:12px;

text-decoration:none;

font-weight:600;

transition:.3s;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}


.back:hover{

background:#E53935;

color:white;

}


/* TITLE */

.title{

font-size:36px;

font-weight:700;

color:white;

}


/* REFRESH BUTTON */

.logo{

width:60px;
height:60px;

background:white;

border-radius:15px;

display:flex;

justify-content:center;
align-items:center;

font-size:28px;

color:#006A4E;

box-shadow:0 15px 35px rgba(0,0,0,.15);

cursor:pointer;

transition:.3s;

}


.logo:hover{

background:#E53935;

color:white;

transform:rotate(180deg);

}


/* MAIN */

.container{

max-width:1450px;

margin:auto;

padding:20px;

}


/* SEARCH */

.search-box{

background:white;

border-radius:15px;

padding:18px 22px;

display:flex;

align-items:center;

gap:15px;

box-shadow:0 15px 35px rgba(0,0,0,.18);

margin-bottom:25px;

}


.search-box i{

color:#006A4E;

font-size:20px;

}


.search-box input{

border:none;

outline:none;

width:100%;

font-size:17px;

}


/* TABLE BOX */

.table-box{

background:white;

border-radius:18px;

padding:20px;

box-shadow:0 20px 40px rgba(0,0,0,.18);

overflow:auto;

}


/* TABLE */

table{

width:100%;

border-collapse:collapse;

min-width:1200px;

}


thead{

background:#006A4E;

color:white;

}


th{

padding:18px;

text-align:left;

font-size:15px;

}


td{

padding:18px;

border-bottom:1px solid #eee;

font-size:14px;

}


tbody tr:hover{

background:#f6f6f6;

}


/* STATUS */

.status{

background:#DCFCE7;

color:#166534;

padding:6px 15px;

border-radius:25px;

font-size:13px;

font-weight:600;

display:inline-block;

}


/* VIEW BUTTON */

.view-btn{

background:#006A4E;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

transition:.3s;

}


.view-btn:hover{

background:#E53935;

}


/* FOOTER */

.footer{

text-align:center;

color:white;

padding:30px;

opacity:.8;

}


/* MODAL */

#viewModal{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.6);

justify-content:center;

align-items:center;

z-index:999;

padding:20px;

}


.modal-box{

background:#fff;

width:95%;

max-width:650px;

border-radius:20px;

padding:30px;

position:relative;

box-shadow:0 25px 60px rgba(0,0,0,.35);

animation:popup .3s;

}


.close-modal{

position:absolute;

right:20px;

top:12px;

font-size:30px;

font-weight:bold;

cursor:pointer;

color:#E53935;

}


.modal-title{

color:#006A4E;

margin-bottom:25px;

}


/* DETAIL TABLE */

.detail-table{

width:100%;

border-collapse:collapse;

table-layout:fixed;

}


.detail-table td{

padding:14px;

border-bottom:1px solid #eee;

word-break:break-word;

overflow-wrap:anywhere;

white-space:normal;

}


.detail-table td:first-child{

font-weight:700;

color:#006A4E;

width:35%;

}


.detail-table td:last-child{

width:65%;

}


/* ANIMATION */

@keyframes popup{

0%{

transform:scale(.8);

opacity:0;

}

100%{

transform:scale(1);

opacity:1;

}

}


/* MOBILE */

@media(max-width:768px){

header{

flex-direction:column;

gap:20px;

padding:20px;

}


.title{

font-size:28px;

}


.back{

order:2;

}


.logo{

order:3;

}


}

</style>

</head>


<body>


<!-- BACKGROUND -->

<div class="bg">

<div class="circle1"></div>

<div class="circle2"></div>

<div class="circle3"></div>

</div>


<!-- HEADER -->

<header>


<!-- BACK TO DASHBOARD AREA -->

<a
href="new-entry.html"
class="back"
>

<i class="fa-solid fa-arrow-left"></i>

Back

</a>


<div class="title">

History

</div>


<!-- REFRESH -->

<div
class="logo"
onclick="loadHistory()"
title="Refresh History"
>

<i class="fa-solid fa-rotate-right"></i>

</div>


</header>


<!-- MAIN -->

<div class="container">


<!-- SEARCH -->

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="search"
placeholder="Search IP, Problem, Reference..."
>

</div>


<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>IP Address</th>

<th>Problem</th>

<th>Date</th>

<th>Reference</th>

<th>Support By</th>

<th>Support Work</th>

<th>Call By</th>

<th>Call Work</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>


<tbody id="historyTable">

<tr>

<td
colspan="10"
style="text-align:center;"
>

Loading...

</td>

</tr>

</tbody>

</table>

</div>


<!-- FOOTER -->

<div class="footer">

© 2026 LINK4 COMMUNICATION | All Rights Reserved

</div>


</div>


<!-- VIEW MODAL -->

<div
id="viewModal"
>

<div class="modal-box">


<span
id="closeModal"
class="close-modal"
>

&times;

</span>


<h2 class="modal-title">

History Details

</h2>


<div
id="modalContent"
style="
max-height:70vh;
overflow-y:auto;
overflow-x:hidden;
"
>

</div>


</div>

</div>


<script>


/* GOOGLE SHEET API */

const API_URL =

"https://script.google.com/macros/s/AKfycbyORO5enoKoHkRV8FkyNjrJ-9hy0uAFRtLQkSPlVlvsMUERua5brnaoN424K6yakLEM/exec";



/* LOGIN CHECK */

function checkLogin(){

    if(
        localStorage.getItem("loggedIn") !== "true"
    ){

        window.location.replace(
            "../index.html"
        );

        return false;

    }

    return true;

}



/* DATE FORMAT */

function formatDate(dateString){

    if(!dateString){

        return "";

    }


    const d = new Date(dateString);


    if(isNaN(d)){

        return dateString;

    }


    const day =

    String(

        d.getDate()

    ).padStart(2,"0");


    const month =

    String(

        d.getMonth()+1

    ).padStart(2,"0");


    const year =

    d.getFullYear();


    return

    `${day}/${month}/${year}`;

}



/* TABLE */

const tbody =

document.getElementById(

"historyTable"

);



/* LOAD HISTORY */

async function loadHistory(){


    if(!checkLogin()){

        return;

    }


    tbody.innerHTML =

    `

    <tr>

    <td
    colspan="10"
    style="text-align:center;"
    >

    Loading...

    </td>

    </tr>

    `;


    try{


        const res =

        await fetch(

            API_URL +

            "?page=history"

        );


        const data =

        await res.json();


        console.log(

            "History Data:",

            data

        );


        tbody.innerHTML = "";


        if(

            !Array.isArray(data) ||

            data.length === 0

        ){

            tbody.innerHTML =

            `

            <tr>

            <td
            colspan="10"
            style="text-align:center;"
            >

            No History Found

            </td>

            </tr>

            `;

            return;

        }


        data.forEach(

        function(row){


            if(

                !row ||

                !row[0]

            ){

                return;

            }


            const ip =

            row[0] || "";


            const problem =

            row[1] || "";


            const date =

            formatDate(

                row[2]

            );


            const reference =

            row[3] || "";


            const support =

            row[4] || "";


            const work =

            row[5] || "";


            const callBy =

            row[6] || "";


            const callWork =

            row[7] || "";


            const tr =

            document.createElement(

                "tr"

            );


            tr.innerHTML = `

            <td>

            ${escapeHTML(ip)}

            </td>


            <td>

            ${escapeHTML(problem)}

            </td>


            <td>

            ${escapeHTML(date)}

            </td>


            <td>

            ${escapeHTML(reference)}

            </td>


            <td>

            ${escapeHTML(support)}

            </td>


            <td>

            ${escapeHTML(work)}

            </td>


            <td>

            ${escapeHTML(callBy)}

            </td>


            <td>

            ${escapeHTML(callWork)}

            </td>


            <td>

            <span class="status">

            Completed

            </span>

            </td>


            <td>

            <button
            class="view-btn"
            >

            <i class="fa-solid fa-eye"></i>

            View

            </button>

            </td>

            `;


            tr

            .querySelector(

                ".view-btn"

            )

            .addEventListener(

            "click",

            function(){

                showDetails(

                    ip,

                    problem,

                    date,

                    reference,

                    support,

                    work,

                    callBy,

                    callWork

                );

            }

            );


            tbody.appendChild(

                tr

            );


        });


    }

    catch(error){


        console.error(

            "History Error:",

            error

        );


        tbody.innerHTML =

        `

        <tr>

        <td
        colspan="10"
        style="
        text-align:center;
        color:red;
        "
        >

        Failed To Load Data

        </td>

        </tr>

        `;


    }

}



/* SAFE HTML */

function escapeHTML(value){

    return String(

        value || ""

    )

    .replace(

        /&/g,

        "&amp;"

    )

    .replace(

        /</g,

        "&lt;"

    )

    .replace(

        />/g,

        "&gt;"

    )

    .replace(

        /"/g,

        "&quot;"

    )

    .replace(

        /'/g,

        "&#039;"

    );

}



/* SHOW DETAILS */

function showDetails(

ip,

problem,

date,

ref,

support,

work,

callby,

callwork

){


    document

    .getElementById(

        "viewModal"

    )

    .style.display =

    "flex";


    document

    .getElementById(

        "modalContent"

    )

    .innerHTML =

    `

    <table class="detail-table">


    <tr>

    <td>IP Address</td>

    <td>${escapeHTML(ip)}</td>

    </tr>


    <tr>

    <td>Problem</td>

    <td>${escapeHTML(problem)}</td>

    </tr>


    <tr>

    <td>Date</td>

    <td>${escapeHTML(date)}</td>

    </tr>


    <tr>

    <td>Reference</td>

    <td>${escapeHTML(ref)}</td>

    </tr>


    <tr>

    <td>Support By</td>

    <td>${escapeHTML(support)}</td>

    </tr>


    <tr>

    <td>Support Work</td>

    <td>${escapeHTML(work)}</td>

    </tr>


    <tr>

    <td>Call By</td>

    <td>${escapeHTML(callby)}</td>

    </tr>


    <tr>

    <td>Call Work</td>

    <td>${escapeHTML(callwork)}</td>

    </tr>


    </table>

    `;

}



/* CLOSE MODAL */

document

.getElementById(

"closeModal"

)

.onclick =

function(){

    document

    .getElementById(

        "viewModal"

    )

    .style.display =

    "none";

};



/* CLICK OUTSIDE MODAL */

window.onclick =

function(e){

    const modal =

    document.getElementById(

        "viewModal"

    );


    if(

        e.target === modal

    ){

        modal.style.display =

        "none";

    }

};



/* SEARCH */

document

.getElementById(

"search"

)

.addEventListener(

"keyup",

function(){


    const value =

    this.value

    .toLowerCase();


    document

    .querySelectorAll(

        "#historyTable tr"

    )

    .forEach(

    function(tr){


        tr.style.display =

        tr.innerText

        .toLowerCase()

        .includes(

            value

        )

        ? ""

        : "none";


    }

    );


}

);



/* INITIAL LOAD */

loadHistory();



/* BROWSER CACHE PROTECTION */

window.addEventListener(

"pageshow",

function(){

    if(

        localStorage.getItem(

            "loggedIn"

        ) !== "true"

    ){

        window.location.replace(

            "../index.html"

        );

    }

}

);

</script>


</body>
