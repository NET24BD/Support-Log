<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support History</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:25px;
    color:#1e293b;
}

/* MAIN CONTAINER */

.container{
    max-width:1250px;
    margin:auto;
    background:#ffffff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 40px rgba(15,23,42,.12);
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.title{
    display:flex;
    align-items:center;
    gap:12px;
}

.title-icon{
    width:48px;
    height:48px;
    border-radius:14px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.title h1{
    font-size:24px;
    color:#0f172a;
}

.title p{
    font-size:13px;
    color:#64748b;
    margin-top:4px;
}

/* TOP CONTROLS */

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:22px;
}

.search-box{
    flex:1;
    min-width:240px;
    position:relative;
}

.search-box input{
    width:100%;
    padding:13px 16px 13px 44px;
    border:1px solid #dbe3ef;
    border-radius:12px;
    outline:none;
    font-size:14px;
    background:#f8fafc;
    transition:.2s;
}

.search-box input:focus{
    border-color:#6366f1;
    background:white;
    box-shadow:0 0 0 4px rgba(99,102,241,.1);
}

.search-icon{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
}

select{
    padding:13px 15px;
    border:1px solid #dbe3ef;
    border-radius:12px;
    background:#f8fafc;
    outline:none;
    cursor:pointer;
}

button{
    border:none;
    cursor:pointer;
    border-radius:12px;
    padding:13px 18px;
    font-weight:bold;
    transition:.2s;
}

.refresh-btn{
    background:#4f46e5;
    color:white;
}

.refresh-btn:hover{
    background:#4338ca;
    transform:translateY(-1px);
}

/* TABLE */

.table-wrapper{
    width:100%;
    overflow-x:auto;
    border:1px solid #e2e8f0;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:850px;
}

thead{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    color:white;
}

th{
    padding:15px 14px;
    text-align:left;
    font-size:13px;
    white-space:nowrap;
}

td{
    padding:14px;
    border-bottom:1px solid #eef2f7;
    font-size:13px;
    vertical-align:middle;
}

tbody tr{
    transition:.2s;
}

tbody tr:hover{
    background:#f8faff;
}

tbody tr:last-child td{
    border-bottom:none;
}

/* BADGES */

.customer-badge{
    display:inline-block;
    padding:6px 10px;
    background:#eef2ff;
    color:#4338ca;
    border-radius:8px;
    font-weight:bold;
}

.support-badge{
    display:inline-block;
    padding:6px 10px;
    background:#ecfdf5;
    color:#047857;
    border-radius:8px;
}

.call-badge{
    display:inline-block;
    padding:6px 10px;
    background:#fff7ed;
    color:#c2410c;
    border-radius:8px;
}

/* VIEW BUTTON */

.view-btn{
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    padding:9px 15px;
    font-size:12px;
}

.view-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 5px 15px rgba(37,99,235,.25);
}

/* EMPTY */

.empty{
    text-align:center;
    padding:50px 20px;
    color:#64748b;
}

.empty-icon{
    font-size:40px;
    margin-bottom:10px;
}

/* LOADING */

.loading{
    text-align:center;
    padding:50px;
    color:#64748b;
}

.spinner{
    width:35px;
    height:35px;
    border:4px solid #e2e8f0;
    border-top-color:#4f46e5;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.65);
    backdrop-filter:blur(5px);
    z-index:9999;
    padding:20px;
    overflow-y:auto;
}

.modal.show{
    display:flex;
    align-items:center;
    justify-content:center;
}

.modal-box{
    width:100%;
    max-width:650px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,.3);
    animation:popup .25s ease;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(.94) translateY(10px);
    }
    to{
        opacity:1;
        transform:scale(1) translateY(0);
    }
}

.modal-header{
    padding:20px 22px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-header h2{
    font-size:19px;
}

.close-btn{
    width:36px;
    height:36px;
    padding:0;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    color:white;
    font-size:20px;
}

.close-btn:hover{
    background:rgba(255,255,255,.3);
}

.modal-body{
    padding:22px;
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.info-card{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px;
}

.info-card.full{
    grid-column:1 / -1;
}

.info-label{
    display:block;
    font-size:11px;
    color:#64748b;
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:6px;
    font-weight:bold;
}

.info-value{
    font-size:14px;
    color:#0f172a;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
}

/* FOOTER */

.footer{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    color:#64748b;
    font-size:12px;
}

/* RESPONSIVE */

@media(max-width:650px){

    body{
        padding:12px;
    }

    .container{
        padding:15px;
        border-radius:15px;
    }

    .title h1{
        font-size:20px;
    }

    .info-grid{
        grid-template-columns:1fr;
    }

    .info-card.full{
        grid-column:auto;
    }

    .footer{
        flex-direction:column;
        gap:5px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="title">

            <div class="title-icon">
                📋
            </div>

            <div>
                <h1>Support History</h1>
                <p>Completed support and call records</p>
            </div>

        </div>

    </div>


    <!-- CONTROLS -->

    <div class="controls">

        <div class="search-box">

            <span class="search-icon">🔍</span>

            <input
                type="text"
                id="searchInput"
                placeholder="Search Customer ID, Problem, Reference..."
                oninput="filterHistory()"
            >

        </div>


        <select
            id="dateFilter"
            onchange="filterHistory()"
        >

            <option value="">All Records</option>

            <option value="today">
                Today
            </option>

            <option value="7">
                Last 7 Days
            </option>

            <option value="30">
                Last 30 Days
            </option>

        </select>


        <button
            class="refresh-btn"
            onclick="loadHistory()"
        >
            🔄 Refresh
        </button>

    </div>


    <!-- TABLE -->

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>Customer ID</th>

                    <th>Date</th>

                    <th>Problem</th>

                    <th>Reference</th>

                    <th>Support</th>

                    <th>Call</th>

                    <th>Action</th>

                </tr>

            </thead>


            <tbody id="historyBody">

                <tr>

                    <td
                        colspan="7"
                        class="loading"
                    >

                        <div class="spinner"></div>

                        Loading history...

                    </td>

                </tr>

            </tbody>

        </table>

    </div>


    <!-- FOOTER -->

    <div class="footer">

        <span id="recordCount">
            0 Records
        </span>

        <span>
            LINK4 Communication
        </span>

    </div>

</div>


<!-- =================================================
     VIEW MODAL
================================================= -->

<div
    class="modal"
    id="viewModal"
    onclick="closeModalOutside(event)"
>

    <div
        class="modal-box"
        onclick="event.stopPropagation()"
    >

        <div class="modal-header">

            <h2>
                📄 History Details
            </h2>

            <button
                class="close-btn"
                onclick="closeModal()"
            >
                ×
            </button>

        </div>


        <div
            class="modal-body"
            id="modalBody"
        >

        </div>

    </div>

</div>


<script>

/* =====================================================
   CONFIGURATION
===================================================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   GLOBAL DATA
===================================================== */

let historyData = [];


/* =====================================================
   LOAD HISTORY
===================================================== */

async function loadHistory(){

    const body =
        document.getElementById(
            "historyBody"
        );

    body.innerHTML = `

        <tr>

            <td
                colspan="7"
                class="loading"
            >

                <div class="spinner"></div>

                Loading history...

            </td>

        </tr>

    `;


    try{

        const response =
            await fetch(

                API_URL +
                "?action=history&_=" +
                Date.now(),

                {
                    method:"GET",
                    cache:"no-store"
                }

            );


        const result =
            await response.json();


        if(
            !result.success
        ){

            throw new Error(

                result.message ||
                "Failed to load history."

            );

        }


        historyData =
            Array.isArray(
                result.data
            )
            ? result.data
            : [];


        renderHistory(
            historyData
        );


    }catch(error){

        body.innerHTML = `

            <tr>

                <td
                    colspan="7"
                    class="empty"
                >

                    <div class="empty-icon">
                        ⚠️
                    </div>

                    Failed to load history

                    <br>

                    <small>
                        ${escapeHtml(
                            error.message
                        )}
                    </small>

                </td>

            </tr>

        `;

    }

}


/* =====================================================
   RENDER HISTORY
===================================================== */

function renderHistory(data){

    const body =
        document.getElementById(
            "historyBody"
        );


    document.getElementById(
        "recordCount"
    ).textContent =

        data.length +

        (
            data.length === 1
            ? " Record"
            : " Records"
        );


    if(
        !data.length
    ){

        body.innerHTML = `

            <tr>

                <td
                    colspan="7"
                    class="empty"
                >

                    <div class="empty-icon">
                        📭
                    </div>

                    No history records found.

                </td>

            </tr>

        `;

        return;

    }


    body.innerHTML = "";


    data.forEach(

        function(item,index){

            const row =
                document.createElement(
                    "tr"
                );


            row.innerHTML = `

                <td>

                    <span class="customer-badge">

                        ${escapeHtml(
                            item.customerId ||
                            item.customerNumber ||
                            item.ip ||
                            ""
                        )}

                    </span>

                </td>


                <td>

                    ${escapeHtml(
                        item.date || ""
                    )}

                </td>


                <td>

                    ${escapeHtml(
                        item.problem || ""
                    )}

                </td>


                <td>

                    ${escapeHtml(
                        item.reference ||
                        item.ref ||
                        "-"
                    )}

                </td>


                <td>

                    <span class="support-badge">

                        ${escapeHtml(
                            item.support ||
                            "-"
                        )}

                    </span>

                </td>


                <td>

                    <span class="call-badge">

                        ${escapeHtml(
                            item.call ||
                            "-"
                        )}

                    </span>

                </td>


                <td>

                    <button
                        class="view-btn"
                        onclick="viewHistory(${index})"
                    >

                        👁 View

                    </button>

                </td>

            `;


            body.appendChild(
                row
            );

        }

    );

}


/* =====================================================
   VIEW HISTORY
===================================================== */

function viewHistory(index){

    const item =
        historyData[index];


    if(!item){
        return;
    }


    const customerId =
        item.customerId ||
        item.customerNumber ||
        item.ip ||
        "";


    const reference =
        item.reference ||
        item.ref ||
        "-";


    document.getElementById(
        "modalBody"
    ).innerHTML = `

        <div class="info-grid">


            <div class="info-card">

                <span class="info-label">
                    Customer ID
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        customerId
                    )}
                </div>

            </div>


            <div class="info-card">

                <span class="info-label">
                    Date
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.date || ""
                    )}
                </div>

            </div>


            <div class="info-card full">

                <span class="info-label">
                    Problem
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.problem || ""
                    )}
                </div>

            </div>


            <div class="info-card full">

                <span class="info-label">
                    Reference
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        reference
                    )}
                </div>

            </div>


            <div class="info-card">

                <span class="info-label">
                    Support Person
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.support || "-"
                    )}
                </div>

            </div>


            <div class="info-card">

                <span class="info-label">
                    Call Person
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.call || "-"
                    )}
                </div>

            </div>


            <div class="info-card full">

                <span class="info-label">
                    Support Work
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.supportWork || "-"
                    )}
                </div>

            </div>


            <div class="info-card full">

                <span class="info-label">
                    Call Work
                </span>

                <div class="info-value">
                    ${escapeHtml(
                        item.callWork || "-"
                    )}
                </div>

            </div>


        </div>

    `;


    document.getElementById(
        "viewModal"
    ).classList.add(
        "show"
    );

}


/* =====================================================
   CLOSE MODAL
===================================================== */

function closeModal(){

    document.getElementById(
        "viewModal"
    ).classList.remove(
        "show"
    );

}


function closeModalOutside(event){

    if(
        event.target.id ===
        "viewModal"
    ){

        closeModal();

    }

}


/* =====================================================
   FILTER HISTORY
===================================================== */

function filterHistory(){

    const search =
        document
            .getElementById(
                "searchInput"
            )
            .value
            .toLowerCase()
            .trim();


    const dateFilter =
        document
            .getElementById(
                "dateFilter"
            )
            .value;


    let filtered =
        historyData.filter(

            function(item){

                const text = (

                    item.customerId ||
                    item.customerNumber ||
                    item.ip ||
                    ""

                ) + " " + (

                    item.date ||
                    ""

                ) + " " + (

                    item.problem ||
                    ""

                ) + " " + (

                    item.reference ||
                    item.ref ||
                    ""

                ) + " " + (

                    item.support ||
                    ""

                ) + " " + (

                    item.call ||
                    ""

                );


                const matchesSearch =

                    !search ||

                    text
                        .toLowerCase()
                        .includes(
                            search
                        );


                const matchesDate =

                    checkDateFilter(

                        item.date,

                        dateFilter

                    );


                return (

                    matchesSearch &&

                    matchesDate

                );

            }

        );


    renderHistory(
        filtered
    );

}


/* =====================================================
   DATE FILTER
===================================================== */

function checkDateFilter(
    dateString,
    filter
){

    if(
        !filter ||
        !dateString
    ){

        return true;

    }


    const parts =
        String(
            dateString
        ).split(
            " "
        )[0].split(
            "-"
        );


    if(
        parts.length !== 3
    ){

        return true;

    }


    const date =
        new Date(

            Number(
                parts[2]
            ),

            Number(
                parts[1]
            ) - 1,

            Number(
                parts[0]
            )

        );


    if(
        isNaN(
            date.getTime()
        )
    ){

        return true;

    }


    const today =
        new Date();


    today.setHours(
        0,0,0,0
    );


    date.setHours(
        0,0,0,0
    );


    if(
        filter === "today"
    ){

        return (

            date.getTime() ===
            today.getTime()

        );

    }


    const days =
        Number(
            filter
        );


    const oldDate =
        new Date(
            today
        );


    oldDate.setDate(

        today.getDate()
        -
        days

    );


    return (

        date >= oldDate &&

        date <= today

    );

}


/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHtml(
    value
){

    return String(
        value ?? ""
    )
    .replace(
        /&/g,
        "&amp;"
    )
    .replace(
        /</g,
        "&lt;"
    )
    .replace(
        />/g,
        "&gt;"
    )
    .replace(
        /"/g,
        "&quot;"
    )
    .replace(
        /'/g,
        "&#039;"
    );

}


/* =====================================================
   INITIAL LOAD
===================================================== */

document.addEventListener(

    "DOMContentLoaded",

    function(){

        loadHistory();

    }

);


/* =====================================================
   ESC KEY CLOSE MODAL
===================================================== */

document.addEventListener(

    "keydown",

    function(event){

        if(
            event.key ===
            "Escape"
        ){

            closeModal();

        }

    }

);

</script>

</body>
</html>
