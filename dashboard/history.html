<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#005f46,#007f60,#008f6b);
    color:#17202a;
    padding:16px 24px 40px;
}

/* ================================
   TOP HEADER
================================ */

.header{
    max-width:1400px;
    margin:auto;
    background:#f7faf9;
    border-radius:28px;
    padding:24px 30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.header-icon{
    width:74px;
    height:74px;
    border-radius:22px;
    background:#009b72;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    box-shadow:0 8px 20px rgba(0,155,114,.25);
}

.header-title h1{
    color:#00765a;
    font-size:32px;
    margin-bottom:6px;
}

.header-title p{
    color:#65727b;
    font-size:16px;
}

.header-buttons{
    display:flex;
    gap:12px;
}

.btn{
    border:none;
    border-radius:15px;
    padding:14px 22px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
    display:flex;
    align-items:center;
    gap:9px;
}

.btn:hover{
    transform:translateY(-2px);
}

.refresh-btn{
    background:#e5f6f1;
    color:#007f60;
}

.dashboard-btn{
    background:#00785b;
    color:#fff;
}

/* ================================
   USER BAR
================================ */

.user-bar{
    max-width:1400px;
    margin:24px auto;
    padding:16px 24px;
    border:1px solid rgba(255,255,255,.25);
    border-radius:17px;
    background:rgba(255,255,255,.12);
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:17px;
    font-weight:600;
}

.user-bar i{
    margin-right:8px;
}

/* ================================
   FILTER AREA
================================ */

.filter-box{
    max-width:1400px;
    margin:auto;
    background:#f8fbfa;
    border-radius:25px;
    padding:22px;
    box-shadow:0 10px 25px rgba(0,0,0,.10);
}

.filter-grid{
    display:grid;
    grid-template-columns:
        minmax(260px,2fr)
        160px
        170px
        170px
        130px;
    gap:12px;
    align-items:center;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:17px;
    top:50%;
    transform:translateY(-50%);
    color:#009b72;
    font-size:18px;
}

.input-box input{
    width:100%;
    height:54px;
    border:2px solid #e1ece8;
    border-radius:15px;
    outline:none;
    padding:0 16px 0 50px;
    font-size:15px;
    color:#263238;
    background:#fff;
}

.input-box input:focus{
    border-color:#00a47a;
    box-shadow:0 0 0 3px rgba(0,164,122,.10);
}

.date-input{
    width:100%;
    height:54px;
    border:2px solid #e1ece8;
    border-radius:15px;
    outline:none;
    padding:0 14px;
    font-size:14px;
    background:#fff;
    color:#455a64;
}

.date-input:focus{
    border-color:#00a47a;
}

.days-box{
    display:flex;
    align-items:center;
    gap:8px;
    white-space:nowrap;
    font-weight:700;
    color:#37474f;
}

.days-box i{
    color:#008b68;
}

.days-input{
    width:100%;
    height:54px;
    border:2px solid #e1ece8;
    border-radius:15px;
    outline:none;
    padding:0 14px;
    font-size:15px;
}

.filter-btn{
    height:54px;
    border:none;
    border-radius:15px;
    background:#007f60;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.filter-btn:hover{
    background:#00694f;
}

/* ================================
   HISTORY CARD
================================ */

.history-card{
    max-width:1400px;
    margin:24px auto 0;
    background:#f7faf9;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.history-head{
    padding:24px 30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #e6eeeb;
}

.history-head h2{
    font-size:24px;
}

.count-badge{
    background:#008b68;
    color:#fff;
    padding:10px 18px;
    border-radius:25px;
    font-weight:700;
}

/* ================================
   TABLE
================================ */

.table-wrapper{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    min-width:950px;
    border-collapse:collapse;
}

thead{
    background:#00866a;
    color:#fff;
}

th{
    padding:17px 14px;
    text-align:left;
    font-size:13px;
    white-space:nowrap;
}

td{
    padding:17px 14px;
    border-bottom:1px solid #e8efed;
    font-size:14px;
    color:#263238;
    vertical-align:middle;
}

tbody tr{
    transition:.2s;
}

tbody tr:hover{
    background:#f0faf7;
}

.customer-badge{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:7px 12px;
    border-radius:10px;
    background:#e5f6f1;
    color:#00795c;
    font-weight:700;
}

.ref-badge{
    background:#f0f2f5;
    padding:7px 11px;
    border-radius:9px;
    display:inline-block;
}

.view-btn{
    border:none;
    background:#007f60;
    color:#fff;
    padding:9px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    display:inline-flex;
    align-items:center;
    gap:7px;
}

.view-btn:hover{
    background:#00664d;
}

/* ================================
   EMPTY / LOADING
================================ */

.message-box{
    padding:70px 20px;
    text-align:center;
}

.message-icon{
    width:75px;
    height:75px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#e3f7f1;
    color:#009b72;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
}

.message-box h3{
    font-size:23px;
    margin-bottom:10px;
}

.message-box p{
    color:#78909c;
}

/* ================================
   POPUP
================================ */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:9999;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:100%;
    max-width:720px;
    max-height:90vh;
    overflow-y:auto;
    background:#fff;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    animation:popup .2s ease;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(.95);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.modal-header{
    background:#007f60;
    color:#fff;
    padding:20px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.modal-header h2{
    font-size:21px;
}

.close-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

.close-btn:hover{
    background:rgba(255,255,255,.25);
}

.modal-body{
    padding:24px;
}

.details-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.detail-item{
    display:grid;
    grid-template-columns:180px 1fr;
    gap:15px;
    padding:14px 16px;
    border:1px solid #e5eeeb;
    border-radius:13px;
    background:#f8fbfa;
}

.detail-label{
    font-weight:700;
    color:#007b5e;
}

.detail-value{
    color:#263238;
    word-break:break-word;
    white-space:pre-wrap;
}

.modal-footer{
    padding:18px 24px;
    border-top:1px solid #e8efed;
    display:flex;
    justify-content:flex-end;
}

.close-main{
    border:none;
    background:#007f60;
    color:#fff;
    padding:12px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

/* ================================
   RESPONSIVE
================================ */

@media(max-width:1000px){

    .filter-grid{
        grid-template-columns:1fr 1fr;
    }

    .input-box{
        grid-column:1/-1;
    }

}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .header{
        padding:18px;
        border-radius:20px;
        flex-direction:column;
        align-items:flex-start;
    }

    .header-left{
        width:100%;
    }

    .header-icon{
        width:58px;
        height:58px;
        font-size:25px;
    }

    .header-title h1{
        font-size:25px;
    }

    .header-buttons{
        width:100%;
    }

    .header-buttons .btn{
        flex:1;
        justify-content:center;
    }

    .user-bar{
        margin:15px 0;
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
    }

    .filter-box{
        padding:15px;
        border-radius:20px;
    }

    .filter-grid{
        grid-template-columns:1fr;
    }

    .input-box{
        grid-column:auto;
    }

    .history-card{
        border-radius:20px;
    }

    .history-head{
        padding:20px;
    }

    .detail-item{
        grid-template-columns:1fr;
        gap:6px;
    }

}

</style>
</head>


<body>


<!-- ================================
     HEADER
================================ -->

<div class="header">

    <div class="header-left">

        <div class="header-icon">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </div>

        <div class="header-title">

            <h1>History</h1>

            <p>
                View and manage completed support and call records
            </p>

        </div>

    </div>


    <div class="header-buttons">

        <button
            class="btn refresh-btn"
            onclick="loadHistory()"
        >
            <i class="fa-solid fa-rotate"></i>
            Refresh
        </button>


        <button
            class="btn dashboard-btn"
            onclick="goDashboard()"
        >
            <i class="fa-solid fa-arrow-left"></i>
            Dashboard
        </button>

    </div>

</div>


<!-- ================================
     USER BAR
================================ -->

<div class="user-bar">

    <div>
        <i class="fa-solid fa-user"></i>
        Logged in as:
        <strong id="loggedUser">User</strong>
    </div>

    <div>
        <i class="fa-solid fa-clock-rotate-left"></i>
        History Management
    </div>

</div>


<!-- ================================
     FILTER
================================ -->

<div class="filter-box">

    <div class="filter-grid">


        <!-- SEARCH -->

        <div class="input-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Search Customer ID, Problem, Reference, Support..."
                oninput="applyFilters()"
            >

        </div>


        <!-- LAST DAYS -->

        <div class="days-box">

            <i class="fa-regular fa-calendar"></i>

            <span>Last Days</span>

            <input
                type="number"
                id="lastDays"
                class="days-input"
                min="1"
                placeholder="All"
                oninput="applyFilters()"
            >

        </div>


        <!-- DATE FROM -->

        <input
            type="date"
            id="dateFrom"
            class="date-input"
            onchange="applyFilters()"
        >


        <!-- DATE TO -->

        <input
            type="date"
            id="dateTo"
            class="date-input"
            onchange="applyFilters()"
        >


        <!-- ALL / RESET -->

        <button
            class="filter-btn"
            onclick="clearFilters()"
        >
            <i class="fa-solid fa-list"></i>
            All
        </button>

    </div>

</div>


<!-- ================================
     HISTORY TABLE
================================ -->

<div class="history-card">

    <div class="history-head">

        <h2>
            History Records
        </h2>

        <div class="count-badge">

            <span id="recordCount">
                0
            </span>

            Records

        </div>

    </div>


    <div
        id="contentArea"
        class="table-wrapper"
    >

        <div class="message-box">

            <div class="message-icon">

                <i class="fa-solid fa-spinner fa-spin"></i>

            </div>

            <h3>
                Loading History
            </h3>

            <p>
                Please wait...
            </p>

        </div>

    </div>

</div>


<!-- ================================
     VIEW MODAL
================================ -->

<div
    id="viewModal"
    class="modal"
    onclick="closeModalOutside(event)"
>

    <div class="modal-content">


        <div class="modal-header">

            <h2>
                <i class="fa-solid fa-circle-info"></i>
                History Details
            </h2>

            <button
                class="close-btn"
                onclick="closeModal()"
            >
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>


        <div
            id="modalBody"
            class="modal-body"
        >
        </div>


        <div class="modal-footer">

            <button
                class="close-main"
                onclick="closeModal()"
            >
                Close
            </button>

        </div>

    </div>

</div>


<script>

/* =====================================================
   CONFIG
===================================================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   GLOBAL DATA
===================================================== */

let allHistory = [];

let filteredHistory = [];


/* =====================================================
   PAGE LOAD
===================================================== */

document.addEventListener(
    "DOMContentLoaded",
    function(){

        loadUser();

        loadHistory();

    }
);


/* =====================================================
   LOAD USER
===================================================== */

function loadUser(){

    const user =
        localStorage.getItem("username") ||

        localStorage.getItem("userName") ||

        localStorage.getItem("name") ||

        sessionStorage.getItem("username") ||

        sessionStorage.getItem("userName") ||

        "User";


    document.getElementById(
        "loggedUser"
    ).textContent =
        user;

}


/* =====================================================
   LOAD HISTORY
===================================================== */

async function loadHistory(){

    showLoading();


    try{

        const response =
            await fetch(
                API_URL +
                "?action=history"
            );


        const result =
            await response.json();


        if(
            !result ||
            result.success === false
        ){

            throw new Error(
                result.message ||
                "Failed to load history."
            );

        }


        allHistory =
            Array.isArray(
                result.data
            )
            ? result.data
            : [];


        filteredHistory =
            [...allHistory];


        applyFilters();


    }catch(error){

        console.error(error);

        showError(
            error.message
        );

    }

}


/* =====================================================
   APPLY FILTERS
===================================================== */

function applyFilters(){

    const search =
        document
        .getElementById(
            "searchInput"
        )
        .value
        .toLowerCase()
        .trim();


    const lastDaysValue =
        document
        .getElementById(
            "lastDays"
        )
        .value;


    const lastDays =
        parseInt(
            lastDaysValue
        );


    const dateFrom =
        document
        .getElementById(
            "dateFrom"
        )
        .value;


    const dateTo =
        document
        .getElementById(
            "dateTo"
        )
        .value;


    const now =
        new Date();


    filteredHistory =
        allHistory.filter(
            function(item){


                /* ============================
                   SEARCH
                ============================ */

                const searchable = [

                    item.customerId,

                    item.customerNumber,

                    item.date,

                    item.problem,

                    item.reference,

                    item.ref,

                    item.support,

                    item.call

                ]
                .join(" ")
                .toLowerCase();


                if(
                    search &&
                    !searchable.includes(
                        search
                    )
                ){

                    return false;

                }


                /* ============================
                   DATE
                ============================ */

                const itemDate =
                    parseHistoryDate(
                        item.date
                    );


                /* ============================
                   LAST DAYS
                ============================ */

                if(
                    !isNaN(lastDays) &&
                    lastDays > 0
                ){

                    if(
                        !itemDate
                    ){

                        return false;

                    }


                    const start =
                        new Date(
                            now
                        );


                    start.setHours(
                        0,0,0,0
                    );


                    start.setDate(
                        start.getDate()
                        -
                        lastDays
                        +
                        1
                    );


                    if(
                        itemDate <
                        start
                    ){

                        return false;

                    }

                }


                /* ============================
                   DATE FROM
                ============================ */

                if(
                    dateFrom
                ){

                    const from =
                        new Date(
                            dateFrom +
                            "T00:00:00"
                        );


                    if(
                        itemDate &&
                        itemDate < from
                    ){

                        return false;

                    }

                }


                /* ============================
                   DATE TO
                ============================ */

                if(
                    dateTo
                ){

                    const to =
                        new Date(
                            dateTo +
                            "T23:59:59"
                        );


                    if(
                        itemDate &&
                        itemDate > to
                    ){

                        return false;

                    }

                }


                return true;

            }
        );


    renderHistory();

}


/* =====================================================
   PARSE DATE
===================================================== */

function parseHistoryDate(
    value
){

    if(
        !value
    ){

        return null;

    }


    const text =
        String(
            value
        ).trim();


    /* YYYY-MM-DD */

    if(
        /^\d{4}-\d{2}-\d{2}/
        .test(text)
    ){

        const d =
            new Date(
                text.replace(
                    " ",
                    "T"
                )
            );


        return isNaN(
            d.getTime()
        )
        ? null
        : d;

    }


    /* DD-MM-YYYY */

    const match =
        text.match(
            /^(\d{1,2})-(\d{1,2})-(\d{4})/
        );


    if(match){

        const d =
            new Date(

                Number(
                    match[3]
                ),

                Number(
                    match[2]
                ) - 1,

                Number(
                    match[1]
                )

            );


        return isNaN(
            d.getTime()
        )
        ? null
        : d;

    }


    const normal =
        new Date(
            text
        );


    return isNaN(
        normal.getTime()
    )
    ? null
    : normal;

}


/* =====================================================
   RENDER HISTORY
===================================================== */

function renderHistory(){

    const area =
        document.getElementById(
            "contentArea"
        );


    document.getElementById(
        "recordCount"
    ).textContent =
        filteredHistory.length;


    if(
        filteredHistory.length === 0
    ){

        area.innerHTML = `

            <div class="message-box">

                <div class="message-icon">

                    <i class="fa-solid fa-check"></i>

                </div>

                <h3>
                    No History Found
                </h3>

                <p>
                    No matching history records were found.
                </p>

            </div>

        `;

        return;

    }


    let html = `

        <table>

            <thead>

                <tr>

                    <th>Customer ID</th>

                    <th>Date</th>

                    <th>Problem</th>

                    <th>Reference</th>

                    <th>Support</th>

                    <th>Call</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

    `;


    filteredHistory.forEach(
        function(item,index){

            html += `

                <tr>

                    <td>

                        <span
                            class="customer-badge"
                        >

                            <i
                                class="fa-solid fa-user"
                            ></i>

                            ${escapeHTML(
                                item.customerId ||
                                item.customerNumber ||
                                ""
                            )}

                        </span>

                    </td>


                    <td>

                        ${escapeHTML(
                            item.date ||
                            ""
                        )}

                    </td>


                    <td>

                        ${escapeHTML(
                            item.problem ||
                            ""
                        )}

                    </td>


                    <td>

                        <span
                            class="ref-badge"
                        >

                            ${escapeHTML(
                                item.reference ||
                                item.ref ||
                                ""
                            )}

                        </span>

                    </td>


                    <td>

                        ${escapeHTML(
                            item.support ||
                            ""
                        )}

                    </td>


                    <td>

                        ${escapeHTML(
                            item.call ||
                            ""
                        )}

                    </td>


                    <td>

                        <button
                            class="view-btn"
                            onclick="viewHistory(${index})"
                        >

                            <i
                                class="fa-solid fa-eye"
                            ></i>

                            View

                        </button>

                    </td>

                </tr>

            `;

        }
    );


    html += `

            </tbody>

        </table>

    `;


    area.innerHTML =
        html;

}


/* =====================================================
   VIEW HISTORY
===================================================== */

function viewHistory(
    index
){

    const item =
        filteredHistory[index];


    if(
        !item
    ){

        return;

    }


    const details = [

        [
            "Customer ID",
            item.customerId ||
            item.customerNumber ||
            ""
        ],

        [
            "Date",
            item.date ||
            ""
        ],

        [
            "Problem",
            item.problem ||
            ""
        ],

        [
            "Reference",
            item.reference ||
            item.ref ||
            ""
        ],

        [
            "Support",
            item.support ||
            ""
        ],

        [
            "Support Work",
            item.supportWork ||
            ""
        ],

        [
            "Call",
            item.call ||
            ""
        ],

        [
            "Call Work",
            item.callWork ||
            ""
        ]

    ];


    let html =
        '<div class="details-list">';


    details.forEach(
        function(detail){

            html += `

                <div class="detail-item">

                    <div
                        class="detail-label"
                    >

                        ${escapeHTML(
                            detail[0]
                        )}

                    </div>

                    <div
                        class="detail-value"
                    >

                        ${escapeHTML(
                            detail[1] ||
                            "N/A"
                        )}

                    </div>

                </div>

            `;

        }
    );


    html +=
        "</div>";


    document.getElementById(
        "modalBody"
    ).innerHTML =
        html;


    document.getElementById(
        "viewModal"
    ).classList.add(
        "show"
    );

}


/* =====================================================
   CLOSE MODAL
===================================================== */

function closeModal(){

    document.getElementById(
        "viewModal"
    ).classList.remove(
        "show"
    );

}


function closeModalOutside(
    event
){

    if(
        event.target.id ===
        "viewModal"
    ){

        closeModal();

    }

}


/* =====================================================
   CLEAR FILTERS
===================================================== */

function clearFilters(){

    document.getElementById(
        "searchInput"
    ).value =
        "";

    document.getElementById(
        "lastDays"
    ).value =
        "";

    document.getElementById(
        "dateFrom"
    ).value =
        "";

    document.getElementById(
        "dateTo"
    ).value =
        "";


    filteredHistory =
        [...allHistory];


    renderHistory();

}

/* =====================================================
   ESCAPE HTML
===================================================== */

function escapeHTML(
value
){

    return String(
        value ??
        ""
    )
    .replace(
        /&/g,
        "&amp;"
    )
    .replace(
        /</g,
        "&lt;"
    )
    .replace(
        />/g,
        "&gt;"
    )
    .replace(
        /"/g,
        "&quot;"
    )
    .replace(
        /'/g,
        "&#039;"
    );

}
