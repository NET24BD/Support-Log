>

<!-- =================================================

================================================= -->

<div class="table-box">

<table>

<thead>

<tr>

<script>


/* =================================================
   LOGIN PROTECTION
================================================= */

function checkLogin(){

    const loggedIn =
        localStorage.getItem("loggedIn");

    if(loggedIn !== "true"){

        window.location.replace(
            "../index.html"
        );

        return false;

    }

    return true;

}



/* =================================================
   GOOGLE APPS SCRIPT API
================================================= */

const API_URL =

"https://script.google.com/macros/s/AKfycbyORO5enoKoHkRV8FkyNjrJ-9hy0uAFRtLQkSPlVlvsMUERua5brnaoN424K6yakLEM/exec";



/* =================================================
   ELEMENTS
================================================= */

const tbody =

document.getElementById(
    "historyTable"
);


const searchInput =

document.getElementById(
    "search"
);


const viewModal =

document.getElementById(
    "viewModal"
);


const closeModal =

document.getElementById(
    "closeModal"
);


const modalContent =

document.getElementById(
    "modalContent"
);


const refreshBtn =

document.getElementById(
    "refreshBtn"
);



/* =================================================
   DATE FORMAT
================================================= */

function formatDate(dateString){

    if(!dateString){

        return "";

    }


    const d =
        new Date(dateString);


    if(isNaN(d.getTime())){

        return dateString;

    }


    const day =

        String(
            d.getDate()
        ).padStart(2,"0");


    const month =

        String(
            d.getMonth() + 1
        ).padStart(2,"0");


    const year =

        d.getFullYear();


    return

        `${day}/${month}/${year}`;

}



/* =================================================
   HTML SAFE TEXT
================================================= */

function escapeHTML(value){

    if(value === null ||
       value === undefined){

        return "";

    }


    const div =
        document.createElement("div");


    div.textContent =
        String(value);


    return div.innerHTML;

}



/* =================================================
   LOAD HISTORY
================================================= */

async function loadHistory(){

    if(!checkLogin()){

        return;

    }


    tbody.innerHTML =

    `

    <tr>

    <td
    colspan="10"
    class="loading"
    >

    <i class="fa-solid fa-spinner fa-spin"></i>

    &nbsp;

    Loading History...

    </td>

    </tr>

    `;


    try{


        const response =

        await fetch(

            API_URL +
            "?page=history&_=" +
            Date.now(),

            {

                method:"GET",

                cache:"no-store"

            }

        );


        if(!response.ok){

            throw new Error(
                "Server Error: " +
                response.status
            );

        }


        const data =

        await response.json();


        console.log(
            "History Data:",
            data
        );


        tbody.innerHTML = "";



        if(

            !Array.isArray(data) ||

            data.length === 0

        ){

            tbody.innerHTML =

            `

            <tr>

            <td
            colspan="10"
            style="text-align:center;padding:30px;"
            >

            No History Found

            </td>

            </tr>

            `;

            return;

        }



        let foundData = false;



        data.forEach(

        function(row){

            if(

                !row ||

                !row[0]

            ){

                return;

            }


            foundData = true;


            const tr =

            document.createElement(
                "tr"
            );


            const values = [

                row[0] || "",

                row[1] || "",

                formatDate(
                    row[2]
                ),

                row[3] || "",

                row[4] || "",

                row[5] || "",

                row[6] || "",

                row[7] || ""

            ];



            values.forEach(

            function(value){

                const td =

                document.createElement(
                    "td"
                );


                td.textContent =
                    value;


                tr.appendChild(
                    td
                );

            }

            );



            /* STATUS */

            const statusTd =

            document.createElement(
                "td"
            );


            statusTd.innerHTML =

            `

            <span class="status">

            Completed

            </span>

            `;


            tr.appendChild(
                statusTd
            );



            /* ACTION */

            const actionTd =

            document.createElement(
                "td"
            );


            const viewButton =

            document.createElement(
                "button"
            );


            viewButton.className =
                "view-btn";


            viewButton.innerHTML =

            `

            <i class="fa-solid fa-eye"></i>

            View

            `;


            viewButton.addEventListener(

                "click",

                function(){

                    showDetails(
                        values[0],
                        values[1],
                        values[2],
                        values[3],
                        values[4],
                        values[5],
                        values[6],
                        values[7]
                    );

                }

            );


            actionTd.appendChild(
                viewButton
            );


            tr.appendChild(
                actionTd
            );


            tbody.appendChild(
                tr
            );


        }

        );



        if(!foundData){

            tbody.innerHTML =

            `

            <tr>

            <td
            colspan="10"
            style="text-align:center;padding:30px;"
            >

            No History Found

            </td>

            </tr>

            `;

        }


    }

    catch(error){


        console.error(

            "History Load Error:",

            error

        );


        tbody.innerHTML =

        `

        <tr>

        <td
        colspan="10"
        class="error-message"
        >

        <i class="fa-solid fa-circle-exclamation"></i>

        <br><br>

        Failed To Load History Data

        </td>

        </tr>

        `;

    }

}



/* =================================================
   SHOW HISTORY DETAILS
================================================= */

function showDetails(

    ip,

    problem,

    date,

    reference,

    support,

    work,

    callBy,

    callWork

){


    modalContent.innerHTML =

    `

    <table class="detail-table">

    <tr>

    <td>IP Address</td>

    <td>${escapeHTML(ip)}</td>

    </tr>


    <tr>

    <td>Problem</td>

    <td>${escapeHTML(problem)}</td>

    </tr>


    <tr>

    <td>Date</td>

    <td>${escapeHTML(date)}</td>

    </tr>


    <tr>

    <td>Reference</td>

    <td>${escapeHTML(reference)}</td>

    </tr>


    <tr>

    <td>Support By</td>

    <td>${escapeHTML(support)}</td>

    </tr>


    <tr>

    <td>Support Work</td>

    <td>${escapeHTML(work)}</td>

    </tr>


    <tr>

    <td>Call By</td>

    <td>${escapeHTML(callBy)}</td>

    </tr>


    <tr>

    <td>Call Work</td>

    <td>${escapeHTML(callWork)}</td>

    </tr>


    </table>

    `;


    viewModal.style.display =
        "flex";

}



/* =================================================
   CLOSE MODAL
================================================= */

function hideModal(){

    viewModal.style.display =
        "none";

}


closeModal.addEventListener(

    "click",

    hideModal

);



/* =================================================
   CLICK OUTSIDE MODAL
================================================= */

viewModal.addEventListener(

    "click",

    function(e){

        if(

            e.target ===

            viewModal

        ){

            hideModal();

        }

    }

);



/* =================================================
   ESC KEY CLOSE MODAL
================================================= */

document.addEventListener(

    "keydown",

    function(e){

        if(e.key === "Escape"){

            hideModal();

        }

    }

);



/* =================================================
   SEARCH HISTORY
================================================= */

searchInput.addEventListener(

    "input",

    function(){

        const value =

        this.value

        .toLowerCase()

        .trim();


        document

        .querySelectorAll(

            "#historyTable tr"

        )

        .forEach(

        function(tr){

            const text =

            tr.innerText

            .toLowerCase();


            tr.style.display =

            text.includes(value)

            ? ""

            : "none";

        }

        );

    }

);



/* =================================================
   REFRESH BUTTON
================================================= */

refreshBtn.addEventListener(

    "click",

    function(){

        loadHistory();

    }

);



/* =================================================
   BROWSER BACK / CACHE PROTECTION
================================================= */

window.addEventListener(

    "pageshow",

    function(){

        if(

            localStorage.getItem(
                "loggedIn"
            ) !== "true"

        ){

            window.location.replace(
                "../index.html"
            );

        }

    }

);



/* =================================================
   START
================================================= */

loadHistory();


</script>
