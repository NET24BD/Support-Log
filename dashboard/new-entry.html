    inset:0;

    background:rgba(0,0,0,.45);

/* =====================================================
   ANIMATION
===================================================== */

@keyframes popupFadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}


@keyframes popupZoomIn{

    from{

        transform:scale(.8);

        opacity:0;

    }

    to{

        transform:scale(1);

        opacity:1;

    }

}


@keyframes popupSpin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

    }

}

<script>


/* =====================================================
   API URL
===================================================== */

const API_URL =

"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";


/* =====================================================
   ELEMENTS
===================================================== */

const sidebar =

document.getElementById(

"sidebar"

);


const menuToggle =

document.getElementById(

"menuToggle"

);


const sidebarOverlay =

document.getElementById(

"sidebarOverlay"

);


const logoutBtn =

document.getElementById(

"logoutBtn"

);


/* =====================================================
   SIDEBAR TOGGLE
   DESKTOP:
   Sidebar Minimize / Expand

   MOBILE:
   Sidebar Open / Close
===================================================== */

menuToggle.addEventListener(

    "click",

    function(){

        if(

            window.innerWidth <= 768

        ){

            sidebar.classList.toggle(

                "mobile-open"

            );

            sidebarOverlay.classList.toggle(

                "active"

            );

        }

        else{

            sidebar.classList.toggle(

                "collapsed"

            );

        }

    }

);


/* =====================================================
   MOBILE OVERLAY CLICK
===================================================== */

sidebarOverlay.addEventListener(

    "click",

    function(){

        sidebar.classList.remove(

            "mobile-open"

        );

        sidebarOverlay.classList.remove(

            "active"

        );

    }

);


/* =====================================================
   MENU LINK CLICK
===================================================== */

document

.querySelectorAll(

    ".menu-item"

)

.forEach(

    function(item){

        item.addEventListener(

            "click",

            function(){

                if(

                    window.innerWidth <= 768

                ){

                    sidebar.classList.remove(

                        "mobile-open"

                    );

                    sidebarOverlay.classList.remove(

                        "active"

            }

        );

    }

);

}

/* =====================================================
   POPUP ELEMENTS
===================================================== */

const entryForm =

document.getElementById(

"entryForm"

);


const submitBtn =

document.getElementById(

"submitBtn"

);


const popupOverlay =

document.getElementById(

"popupOverlay"

);


const popupBox =

document.getElementById(

"popupBox"

);


const popupIcon =

document.getElementById(

"popupIcon"

);


const popupTitle =

document.getElementById(

"popupTitle"

);


const popupMessage =

document.getElementById(

"popupMessage"

);


const popupOk =

document.getElementById(

"popupOk"

);


const referenceInput =

document.getElementById(

"reference"

);


/* =====================================================
   SHOW POPUP
===================================================== */

function showPopup(

    type,

    title,

    message,

    showButton = true

){

    popupBox.className =

    "popup-box " +

    type;


    popupTitle.textContent =

    title;


    popupMessage.textContent =

    message;


    popupOk.style.display =

    showButton

    ?

    "block"

    :

    "none";


    if(

        type === "success"

    ){

        popupIcon.innerHTML =

        '<i class="fa-solid fa-check"></i>';

    }


    else if(

        type === "error"

    ){

        popupIcon.innerHTML =

        '<i class="fa-solid fa-xmark"></i>';

    }


    else if(

        type === "warning"

    ){

        popupIcon.innerHTML =

        '<i class="fa-solid fa-exclamation"></i>';

    }


    else if(

        type === "loading"

    ){

        popupIcon.innerHTML =

        '<i class="fa-solid fa-spinner loading-spinner"></i>';

    }


    popupOverlay.classList.add(

        "active"

    );

}


/* =====================================================
   HIDE POPUP
===================================================== */

function hidePopup(){

    popupOverlay.classList.remove(

        "active"

    );

}


popupOk.addEventListener(

    "click",

    hidePopup

);


/* =====================================================
   CLOSE POPUP OUTSIDE CLICK
===================================================== */

popupOverlay.addEventListener(

    "click",

    function(e){

        if(

            e.target ===

            popupOverlay

        ){

            hidePopup();

        }

    }

);


/* =====================================================
   FORM SUBMIT
===================================================== */

entryForm.addEventListener(

    "submit",

    async function(e){

        e.preventDefault();


        /* SECURITY CHECK */

        if(!checkLogin()){

            return;

        }


        /* GET DATA */

        const customerId =

        document

        .getElementById(

            "ip"

        )

        .value

        .trim();


        const problem =

        document

        .getElementById(

            "problem"

        )

        .value

        .trim();


        const reference =

        localStorage

        .getItem(

            "username"

        )

        ||

        "";


        /* VALIDATION */

        if(!customerId){

            showPopup(

                "warning",

                "Customer ID Required",

                "Please enter the Customer ID."

            );

            return;

        }


        if(!problem){

            showPopup(

                "warning",

                "Problem Required",

                "Please enter the Customer Problem."

            );

            return;

        }


        if(!reference){

            showPopup(

                "error",

                "Login Error",

                "Username not found. Please login again."

            );

            return;

        }


        /* OLD BUTTON */

        const oldButtonText =

        submitBtn.innerHTML;


        /* DISABLE */

        submitBtn.disabled =

        true;


        submitBtn.innerHTML =

        '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';


        /* LOADING POPUP */

        showPopup(

            "loading",

            "Submitting...",

            "Please wait while your support request is being submitted.",

            false

        );


        /* FORM DATA */

        const formData =

        new URLSearchParams();


        formData.append(

            "action",

            "newEntry"

        );


        formData.append(

            "customerId",

            customerId

        );


        formData.append(

            "problem",

            problem

        );


        formData.append(

            "reference",

            reference

        );


        /* SEND */

        try{


            await fetch(

                API_URL,

                {

                    method:"POST",

                    mode:"no-cors",

                    headers:{

                        "Content-Type":

                        "application/x-www-form-urlencoded;charset=UTF-8"

                    },

                    body:

                    formData.toString()

                }

            );


            /* SUCCESS */

            showPopup(

                "success",

                "Support Submitted!",

                "Your support request has been successfully submitted."

            );


            /* CLEAR CUSTOMER ID */

            document

            .getElementById(

                "ip"

            )

            .value = "";


            /* CLEAR PROBLEM */

            document

            .getElementById(

                "problem"

            )

            .value = "";


            /* KEEP USERNAME */

            referenceInput.value =

            localStorage.getItem(

                "username"

            )

            ||

            "";


        }


        catch(error){


            console.error(

                "Submit Error:",

                error

            );


            showPopup(

                "error",

                "Submission Failed",

                "Unable to submit your support request. Please try again."

            );

        }


        /* RESTORE BUTTON */

        submitBtn.disabled =

        false;


        submitBtn.innerHTML =

        oldButtonText;

    }

);
