<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>User Account | LINK4 COMMUNICATION</title>


<!-- =====================================================
     LOGIN SECURITY
===================================================== -->

<script>

(function(){

    if(
        localStorage.getItem("loggedIn") !== "true"
    ){

        window.location.replace("../index.html");

    }

})();

</script>


<!-- =====================================================
     GOOGLE FONT
===================================================== -->

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
>


<!-- =====================================================
     FONT AWESOME
===================================================== -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
>


<style>

/* =====================================================
   RESET
===================================================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:'Inter',sans-serif;

}


/* =====================================================
   BODY
===================================================== */

body{

    min-height:100vh;

    background:

    radial-gradient(
        circle at 10% 10%,
        rgba(0,255,170,.12),
        transparent 30%
    ),

    radial-gradient(
        circle at 90% 90%,
        rgba(229,57,53,.12),
        transparent 30%
    ),

    #061b14;

    color:white;

    overflow-x:hidden;

}


/* =====================================================
   HEADER
===================================================== */

header{

    width:100%;

    height:75px;

    padding:0 50px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:

    1px solid

    rgba(255,255,255,.08);

    background:

    rgba(3,20,15,.75);

    backdrop-filter:blur(15px);

}


/* =====================================================
   LOGO
===================================================== */

.logo{

    display:flex;

    align-items:center;

    gap:12px;

}


.logo-box{

    width:45px;

    height:45px;

    border-radius:13px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:

    linear-gradient(

        135deg,

        #00a86b,

        #006a4e

    );

    box-shadow:

    0 8px 25px

    rgba(0,168,107,.25);

}


.logo-box i{

    font-size:20px;

}


.logo h2{

    font-size:19px;

    font-weight:700;

    letter-spacing:.5px;

}


/* =====================================================
   HEADER RIGHT
===================================================== */

.header-right{

    display:flex;

    align-items:center;

    gap:15px;

}


.header-user{

    display:flex;

    align-items:center;

    gap:10px;

}


.header-user-icon{

    width:38px;

    height:38px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:#006a4e;

    border:

    2px solid

    rgba(255,255,255,.5);

}


#headerUserName{

    font-size:14px;

    font-weight:600;

}


/* =====================================================
   LOGOUT BUTTON
===================================================== */

.logout-btn{

    border:none;

    outline:none;

    cursor:pointer;

    padding:

    10px

    16px;

    border-radius:10px;

    display:flex;

    align-items:center;

    gap:8px;

    color:white;

    background:#e53935;

    font-size:13px;

    font-weight:600;

    transition:.3s;

}


.logout-btn:hover{

    background:#c62828;

    transform:translateY(-2px);

    box-shadow:

    0 8px 20px

    rgba(229,57,53,.25);

}


/* =====================================================
   MAIN
===================================================== */

.main{

    max-width:1100px;

    margin:auto;

    padding:

    55px

    25px;

}


/* =====================================================
   PAGE TITLE
===================================================== */

.page-title{

    margin-bottom:35px;

}


.page-title h1{

    font-size:38px;

    font-weight:800;

    margin-bottom:10px;

}


.page-title p{

    color:#9bb8ad;

    font-size:15px;

}


/* =====================================================
   PROFILE AREA
===================================================== */

.profile-container{

    display:grid;

    grid-template-columns:

    320px

    1fr;

    gap:25px;

}


/* =====================================================
   PROFILE CARD
===================================================== */

.profile-card{

    background:

    rgba(255,255,255,.055);

    border:

    1px solid

    rgba(255,255,255,.09);

    border-radius:24px;

    padding:35px 25px;

    text-align:center;

    backdrop-filter:blur(20px);

    box-shadow:

    0 25px 60px

    rgba(0,0,0,.25);

}


/* =====================================================
   PROFILE AVATAR
===================================================== */

.avatar{

    width:110px;

    height:110px;

    margin:

    0 auto 20px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:42px;

    font-weight:700;

    background:

    linear-gradient(

        135deg,

        #00a86b,

        #006a4e

    );

    border:

    5px solid

    rgba(255,255,255,.15);

    box-shadow:

    0 15px 40px

    rgba(0,168,107,.25);

}


/* =====================================================
   PROFILE NAME
===================================================== */

#profileName{

    font-size:23px;

    font-weight:700;

    margin-bottom:8px;

}


/* =====================================================
   PROFILE USERNAME
===================================================== */

#profileUsername{

    color:#8ca99d;

    font-size:14px;

    margin-bottom:20px;

}


/* =====================================================
   STATUS
===================================================== */

.status{

    display:inline-flex;

    align-items:center;

    gap:7px;

    padding:

    7px

    14px;

    border-radius:30px;

    background:

    rgba(34,197,94,.12);

    color:#4ade80;

    font-size:12px;

    font-weight:600;

}


.status-dot{

    width:7px;

    height:7px;

    border-radius:50%;

    background:#4ade80;

    box-shadow:

    0 0 10px

    #4ade80;

}


/* =====================================================
   INFORMATION CARD
===================================================== */

.info-card{

    background:

    rgba(255,255,255,.055);

    border:

    1px solid

    rgba(255,255,255,.09);

    border-radius:24px;

    padding:35px;

    backdrop-filter:blur(20px);

    box-shadow:

    0 25px 60px

    rgba(0,0,0,.25);

}


.info-title{

    display:flex;

    align-items:center;

    gap:12px;

    margin-bottom:30px;

}


.info-title-icon{

    width:45px;

    height:45px;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:

    rgba(0,168,107,.15);

    color:#00d084;

}


.info-title h2{

    font-size:20px;

}


/* =====================================================
   INFO GRID
===================================================== */

.info-grid{

    display:grid;

    grid-template-columns:

    repeat(2,1fr);

    gap:20px;

}


/* =====================================================
   INFO ITEM
===================================================== */

.info-item{

    padding:20px;

    border-radius:15px;

    background:

    rgba(255,255,255,.035);

    border:

    1px solid

    rgba(255,255,255,.06);

}


/* =====================================================
   INFO LABEL
===================================================== */

.info-label{

    display:block;

    color:#78958a;

    font-size:12px;

    margin-bottom:8px;

}


/* =====================================================
   INFO VALUE
===================================================== */

.info-value{

    font-size:16px;

    font-weight:600;

    color:#f2fff9;

    word-break:break-word;

}


/* =====================================================
   ROLE BADGE
===================================================== */

.role-badge{

    display:inline-block;

    padding:

    6px

    12px;

    border-radius:8px;

    background:

    rgba(37,99,235,.15);

    color:#60a5fa;

    font-size:12px;

    font-weight:600;

}


/* =====================================================
   FOOTER
===================================================== */

.footer{

    text-align:center;

    padding:30px;

    color:#668278;

    font-size:13px;

}


/* =====================================================
   MOBILE
===================================================== */

@media(max-width:768px){

    header{

        padding:

        0

        20px;

    }


    .logo h2{

        font-size:15px;

    }


    .header-user{

        display:none;

    }


    .logout-btn{

        padding:

        9px

        12px;

    }


    .main{

        padding:

        35px

        18px;

    }


    .page-title h1{

        font-size:30px;

    }


    .profile-container{

        grid-template-columns:1fr;

    }


    .profile-card{

        padding:30px 20px;

    }


    .info-card{

        padding:25px 20px;

    }

}


/* =====================================================
   SMALL MOBILE
===================================================== */

@media(max-width:450px){

    .logo-box{

        width:40px;

        height:40px;

    }


    .logo h2{

        font-size:13px;

    }


    .logout-btn span{

        display:none;

    }


    .logout-btn{

        width:40px;

        height:40px;

        padding:0;

        justify-content:center;

    }


    .page-title h1{

        font-size:27px;

    }


    .info-grid{

        grid-template-columns:1fr;

    }

}

</style>

</head>


<body>


<!-- =====================================================
     HEADER
===================================================== -->

<header>


    <!-- LOGO -->

    <div class="logo">

        <div class="logo-box">

            <i class="fa-solid fa-headset"></i>

        </div>


        <h2>

            LINK4 COMMUNICATION

        </h2>

    </div>



    <!-- HEADER RIGHT -->

    <div class="header-right">


        <div class="header-user">

            <div class="header-user-icon">

                <i class="fa-solid fa-user"></i>

            </div>


            <span id="headerUserName">

                User

            </span>

        </div>



        <!-- DIRECT LOGOUT -->

        <button

            class="logout-btn"

            id="logoutBtn"

            type="button"

        >

            <i class="fa-solid fa-right-from-bracket"></i>

            <span>

                Logout

            </span>

        </button>


    </div>

</header>



<!-- =====================================================
     MAIN
===================================================== -->

<main class="main">


    <!-- PAGE TITLE -->

    <div class="page-title">

        <h1>

            My Account

        </h1>


        <p>

            Manage and view your account information.

        </p>

    </div>



    <!-- PROFILE CONTAINER -->

    <div class="profile-container">


        <!-- PROFILE CARD -->

        <div class="profile-card">


            <div

                class="avatar"

                id="avatar"

            >

                U

            </div>


            <h2 id="profileName">

                User

            </h2>


            <p id="profileUsername">

                @username

            </p>


            <div class="status">

                <span class="status-dot"></span>

                <span id="profileStatus">

                    Active

                </span>

            </div>


        </div>



        <!-- ACCOUNT INFORMATION -->

        <div class="info-card">


            <div class="info-title">


                <div class="info-title-icon">

                    <i class="fa-solid fa-id-card"></i>

                </div>


                <h2>

                    Account Information

                </h2>


            </div>



            <div class="info-grid">


                <!-- NAME -->

                <div class="info-item">

                    <span class="info-label">

                        Full Name

                    </span>


                    <span

                        class="info-value"

                        id="infoName"

                    >

                        -

                    </span>

                </div>



                <!-- USERNAME -->

                <div class="info-item">

                    <span class="info-label">

                        Username

                    </span>


                    <span

                        class="info-value"

                        id="infoUsername"

                    >

                        -

                    </span>

                </div>



                <!-- ROLE -->

                <div class="info-item">

                    <span class="info-label">

                        Account Role

                    </span>


                    <span

                        class="role-badge"

                        id="infoRole"

                    >

                        User

                    </span>

                </div>



                <!-- STATUS -->

                <div class="info-item">

                    <span class="info-label">

                        Account Status

                    </span>


                    <span

                        class="info-value"

                        id="infoStatus"

                    >

                        Active

                    </span>

                </div>


            </div>


        </div>


    </div>


</main>



<!-- =====================================================
     FOOTER
===================================================== -->

<div class="footer">

    © 2026 LINK4 COMMUNICATION | All Rights Reserved

</div>



<script>


/* =====================================================
   GET USER DATA FROM LOCAL STORAGE
===================================================== */

const userName =

    localStorage.getItem("name") ||

    localStorage.getItem("username") ||

    "User";


const username =

    localStorage.getItem("username") ||

    "username";


const userRole =

    localStorage.getItem("role") ||

    "User";


const userStatus =

    localStorage.getItem("status") ||

    "Active";



/* =====================================================
   SHOW USER NAME
===================================================== */

document.getElementById(

    "headerUserName"

).textContent = userName;



document.getElementById(

    "profileName"

).textContent = userName;



document.getElementById(

    "infoName"

).textContent = userName;



/* =====================================================
   SHOW USERNAME
===================================================== */

document.getElementById(

    "profileUsername"

).textContent =

    "@" + username;



document.getElementById(

    "infoUsername"

).textContent = username;



/* =====================================================
   SHOW ROLE
===================================================== */

document.getElementById(

    "infoRole"

).textContent = userRole;



/* =====================================================
   SHOW STATUS
===================================================== */

document.getElementById(

    "profileStatus"

).textContent = userStatus;



document.getElementById(

    "infoStatus"

).textContent = userStatus;



/* =====================================================
   CREATE AVATAR LETTER
===================================================== */

const avatar =

    document.getElementById("avatar");


if(userName){

    avatar.textContent =

        userName

        .charAt(0)

        .toUpperCase();

}



/* =====================================================
   DIRECT LOGOUT
===================================================== */

document

.getElementById("logoutBtn")

.addEventListener(

    "click",

    function(){


        /* CLEAR LOGIN DATA */

        localStorage.removeItem(

            "loggedIn"

        );


        localStorage.removeItem(

            "username"

        );


        localStorage.removeItem(

            "name"

        );


        localStorage.removeItem(

            "role"

        );


        localStorage.removeItem(

            "status"

        );


        /* CLEAR SESSION */

        sessionStorage.clear();


        /* GO TO LOGIN */

        window.location.replace(

            "../index.html"

        );


    }

);



/* =====================================================
   BACK / CACHE SECURITY
===================================================== */

window.addEventListener(

    "pageshow",

    function(){

        if(

            localStorage.getItem(

                "loggedIn"

            ) !== "true"

        ){

            window.location.replace(

                "../index.html"

            );

        }

    }

);


/* =====================================================
   VISIBILITY SECURITY
===================================================== */

document.addEventListener(

    "visibilitychange",

    function(){

        if(

            document.visibilityState ===

            "visible"

        ){

            if(

                localStorage.getItem(

                    "loggedIn"

                ) !== "true"

            ){

                window.location.replace(

                    "../index.html"

                );

            }

        }

    }

);


/* =====================================================
   CURRENT YEAR
===================================================== */

document.querySelector(

    ".footer"

).innerHTML =

    "© " +

    new Date().getFullYear() +

    " LINK4 COMMUNICATION | All Rights Reserved";


</script>


</body>

</html>
