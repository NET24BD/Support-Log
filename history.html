<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History | LINK4 COMMUNICATION</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#005C3A;
min-height:100vh;
overflow-x:hidden;
position:relative;

}

/* ===========================
Background
=========================== */

.bg{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;

}

.circle1{

position:absolute;

width:700px;
height:700px;

background:#E53935;

border-radius:50%;

left:50%;
top:50%;

transform:translate(-50%,-50%);

filter:blur(140px);

opacity:.35;

}

.circle2{

position:absolute;

width:260px;
height:260px;

background:#0D8F5A;

border-radius:50%;

left:-120px;
top:-120px;

filter:blur(90px);

}

.circle3{

position:absolute;

width:300px;
height:300px;

background:#0D8F5A;

border-radius:50%;

right:-120px;
bottom:-120px;

filter:blur(90px);

}

/* ===========================
Header
=========================== */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:25px 40px;

}

.back{

background:#fff;

color:#006A4E;

padding:12px 20px;

border-radius:12px;

text-decoration:none;

font-weight:600;

transition:.3s;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.back:hover{

background:#E53935;

color:white;

}

.title{

font-size:36px;

font-weight:700;

color:white;

}

.logo{

width:60px;
height:60px;

background:white;

border-radius:15px;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;

color:#006A4E;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}

/* ===========================
Main
=========================== */

.container{

max-width:1450px;

margin:auto;

padding:20px;

}

/* Search */

.search-box{

background:white;

border-radius:15px;

padding:18px 22px;

display:flex;
align-items:center;

gap:15px;

box-shadow:0 15px 35px rgba(0,0,0,.18);

margin-bottom:25px;

}

.search-box i{

color:#006A4E;

font-size:20px;

}

.search-box input{

border:none;

outline:none;

width:100%;

font-size:17px;

}

/* Table */

.table-box{

background:white;

border-radius:18px;

padding:20px;

box-shadow:0 20px 40px rgba(0,0,0,.18);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

min-width:1200px;

}

thead{

background:#006A4E;

color:white;

}

th{

padding:18px;

text-align:left;

font-size:15px;

}

td{

padding:18px;

border-bottom:1px solid #eee;

font-size:14px;

}

tbody tr:hover{

background:#f6f6f6;

transition:.3s;

}

.status{

background:#DCFCE7;

color:#166534;

padding:6px 15px;

border-radius:25px;

font-size:13px;

font-weight:600;

display:inline-block;

}

.view-btn{

background:#006A4E;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

.view-btn:hover{

background:#E53935;

}

/* Footer */

.footer{

text-align:center;

color:white;

padding:30px;

opacity:.8;

}

/* Responsive */

@media(max-width:768px){

header{

flex-direction:column;

gap:20px;

padding:20px;

}

.title{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="bg">

<div class="circle1"></div>
<div class="circle2"></div>
<div class="circle3"></div>

</div>

<header>

<a href="index.html" class="back">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

<div class="title">

History

</div>

<div class="logo"
onclick="location.reload();"
title="Refresh"
style="cursor:pointer;">

<i class="fa-solid fa-rotate-right"></i>

</div>

</header>

<div class="container">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="search"
placeholder="Search IP, Problem, Reference...">

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>IP Address</th>
<th>Problem</th>
<th>Date</th>
<th>Reference</th>
<th>Support By</th>
<th>Support Work</th>
<th>Call By</th>
<th>Call Work</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="historyTable">

<!-- Google Sheet Data এখানে আসবে -->

</tbody>

</table>

</div>

<div class="footer">

© 2026 LINK4 COMMUNICATION | All Rights Reserved

</div>

</div>
<!-- ===========================
View Modal
=========================== -->

<div id="viewModal"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:999;
">

<div
style="
background:#fff;
width:95%;
max-width:650px;
border-radius:20px;
padding:30px;
position:relative;
box-shadow:0 25px 60px rgba(0,0,0,.35);
animation:popup .3s;
">

<span id="closeModal"
style="
position:absolute;
right:20px;
top:12px;
font-size:30px;
font-weight:bold;
cursor:pointer;
color:#E53935;
">

&times;

</span>

<h2
style="
color:#006A4E;
margin-bottom:25px;
">

History Details

</h2>

<div id="modalContent"

style="
max-height:70vh;
overflow-y:auto;
overflow-x:hidden;
">

</div>

</div>

</div>

<style>

@keyframes popup{

0%{

transform:scale(.8);
opacity:0;

}

100%{

transform:scale(1);
opacity:1;

}

}

.detail-table{

width:100%;
border-collapse:collapse;

}

.detail-table{

width:100%;
border-collapse:collapse;
table-layout:fixed;

}


.detail-table td{

padding:14px;

border-bottom:1px solid #eee;

word-break:break-word;

overflow-wrap:anywhere;

white-space:normal;

}


.detail-table td:first-child{

font-weight:700;

color:#006A4E;

width:35%;

}


.detail-table td:last-child{

width:65%;

}

</style>

<script>

// ===========================
// Google Sheet API
// ===========================

const API_URL =
"https://script.google.com/macros/s/AKfycbyORO5enoKoHkRV8FkyNjrJ-9hy0uAFRtLQkSPlVlvsMUERua5brnaoN424K6yakLEM/exec";
  
function formatDate(dateString){

    if(!dateString) return "";

    const d = new Date(dateString);

    if(isNaN(d)) return dateString;

    const day = String(d.getDate()).padStart(2,"0");
    const month = String(d.getMonth()+1).padStart(2,"0");
    const year = d.getFullYear();

    return `${day}/${month}/${year}`;

}
  
const tbody =
document.getElementById("historyTable");

loadHistory();

async function loadHistory(){

tbody.innerHTML=
`<tr><td colspan="10" style="text-align:center;">Loading...</td></tr>`;

try{

const res = await fetch(API_URL + "?page=history");

const data = await res.json();

  
  
console.log(data);
console.log(data.length);
  
tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
`<tr>
<td colspan="10" style="text-align:center;">
No History Found
</td>
</tr>`;

return;

}
data.forEach(row=>{
  
row[2] = formatDate(row[2]);
  
if(row[0]=="") return;

tbody.innerHTML+=`

<tr>

<td>${row[0]}</td>

<td>${row[1]}</td>

<td>${row[2]}</td>

<td>${row[3]}</td>

<td>${row[4]}</td>

<td>${row[5]}</td>

<td>${row[6]}</td>

<td>${row[7]}</td>

<td>

<span class="status">

Completed

</span>

</td>

<td>

<button class="view-btn"

onclick="showDetails(

'${row[0]}',

'${row[1]}',

'${row[2]}',

'${row[3]}',

'${row[4]}',

'${row[5]}',

'${row[6]}',

'${row[7]}'

)">

<i class="fa-solid fa-eye"></i>

View

</button>

</td>

</tr>

`;

});

}catch(err){

tbody.innerHTML=
`<tr>

<td colspan="10" style="text-align:center;color:red;">

Failed To Load Data

</td>

</tr>`;

console.error(err);

}

}

// ===============================
// View Details
// ===============================

function showDetails(

ip,

problem,

date,

ref,

support,

work,

callby,

callwork

){

document.getElementById("viewModal").style.display="flex";

document.getElementById("modalContent").innerHTML=`

<table class="detail-table">

<tr>

<td>IP Address</td>

<td>${ip}</td>

</tr>

<tr>

<td>Problem</td>

<td>${problem}</td>

</tr>

<tr>

<td>Date</td>

<td>${formatDate(date)}</td>

</tr>

<tr>

<td>Reference</td>

<td>${ref}</td>

</tr>

<tr>

<td>Support By</td>

<td>${support}</td>

</tr>

<tr>

<td>Support Work</td>

<td>${work}</td>

</tr>

<tr>

<td>Call By</td>

<td>${callby}</td>

</tr>

<tr>

<td>Call Work</td>

<td>${callwork}</td>

</tr>

</table>

`;

}

// ===============================
// Close Modal
// ===============================

document.getElementById("closeModal").onclick=function(){

document.getElementById("viewModal").style.display="none";

}

window.onclick=function(e){

if(e.target==document.getElementById("viewModal")){

document.getElementById("viewModal").style.display="none";

}

}

// ===============================
// Search
// ===============================

document.getElementById("search").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll("#historyTable tr").forEach(tr=>{

tr.style.display=
tr.innerText.toLowerCase().includes(value)

? ""

: "none";

});

});

</script>

</body>
</html>
