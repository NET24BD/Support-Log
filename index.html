<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.container{
    width:100%;
    max-width:1100px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    color:#fff;
    font-size:38px;
    font-weight:700;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
    font-size:16px;
}

.grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;

}

.card{

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    padding:40px 20px;
    text-align:center;
    color:white;
    cursor:pointer;
    transition:.35s;

}

.card:hover{

    transform:translateY(-10px);
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    background:rgba(255,255,255,.14);

}

.icon{

    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    color:#fff;
    margin-bottom:25px;

}

.new .icon{
background:#16a34a;
}

.support .icon{
background:#2563eb;
}

.call .icon{
background:#ea580c;
}

.history .icon{
background:#7c3aed;
}

.card h2{

    font-size:24px;
    margin-bottom:12px;

}

.card p{

    color:#d1d5db;
    font-size:15px;
    line-height:24px;

}

.footer{

    text-align:center;
    margin-top:40px;
    color:#94a3b8;
    font-size:14px;

}

@media(max-width:600px){

.header h1{
font-size:28px;
}

.card{
padding:30px 15px;
}

}

</style>

</head>
<body>

<div class="container">

<div class="header">

<h1>Dashboard</h1>
<p>Select an option to continue</p>

</div>

<div class="grid">

<div class="card new" onclick="location.href='new-entry.html'">

<div class="icon">
<i class="fa-solid fa-plus"></i>
</div>

<h2>New Entry</h2>

<p>Create a new customer entry.</p>

</div>


<div class="card support" onclick="location.href='pending-support.html'">

<div class="icon">
<i class="fa-solid fa-headset"></i>
</div>

<h2>Pending Support</h2>

<p>View all pending support requests.</p>

</div>


<div class="card call" onclick="location.href='pending-call.html'">

<div class="icon">
<i class="fa-solid fa-phone"></i>
</div>

<h2>Pending Call</h2>

<p>See all pending customer calls.</p>

</div>


<div class="card history" onclick="location.href='history.html'">

<div class="icon">
<i class="fa-solid fa-clock-rotate-left"></i>
</div>

<h2>History</h2>

<p>Open activity and update history.</p>

</div>

</div>

<div class="footer">

© 2026 Dashboard

</div>

</div>

</body>
</html>
