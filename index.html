<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#006A4E;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* Bangladesh Flag Red Circle */

body::before{

content:"";
position:absolute;
width:700px;
height:700px;
background:#F42A41;
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:0;

}

.container{

position:relative;
z-index:5;

width:100%;
max-width:1100px;

padding:30px;

}

.header{

text-align:center;
margin-bottom:45px;

}

.header h1{

color:white;
font-size:42px;
font-weight:700;

}

.header p{

color:white;
opacity:.9;
margin-top:10px;
font-size:17px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:25px;

}

.card{

background:#fff;

border-radius:18px;

padding:35px 20px;

text-align:center;

cursor:pointer;

transition:.35s;

box-shadow:0 12px 35px rgba(0,0,0,.18);

}

.card:hover{

transform:translateY(-10px);

box-shadow:0 18px 45px rgba(0,0,0,.30);

}

.icon{

width:80px;
height:80px;

margin:auto;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:#006A4E;

color:white;

font-size:32px;

margin-bottom:20px;

transition:.3s;

}

.card:hover .icon{

background:#F42A41;
transform:rotate(8deg);

}

.card h2{

font-size:24px;
margin-bottom:10px;
color:#222;

}

.card p{

color:#666;
font-size:15px;
line-height:24px;

}

.footer{

text-align:center;
margin-top:45px;
color:white;
opacity:.9;

}

/* Mobile */

@media(max-width:768px){

body::before{

width:450px;
height:450px;

}

.header h1{

font-size:30px;

}

.header p{

font-size:15px;

}

.card{

padding:28px 15px;

}

.icon{

width:70px;
height:70px;
font-size:28px;

}

}

</style>

</head>
<body>

<div class="container">

<div class="header">

<h1>Dashboard</h1>

<p>Select an option</p>

</div>

<div class="grid">

<div class="card" onclick="location.href='new-entry.html'">

<div class="icon">

<i class="fa-solid fa-user-plus"></i>

</div>

<h2>New Entry</h2>

<p>Create a new customer entry.</p>

</div>

<div class="card" onclick="location.href='pending-support.html'">

<div class="icon">

<i class="fa-solid fa-headset"></i>

</div>

<h2>Pending Support</h2>

<p>Pending support requests.</p>

</div>

<div class="card" onclick="location.href='pending-call.html'">

<div class="icon">

<i class="fa-solid fa-phone-volume"></i>

</div>

<h2>Pending Call</h2>

<p>Customer pending calls.</p>

</div>

<div class="card" onclick="location.href='history.html'">

<div class="icon">

<i class="fa-solid fa-clock-rotate-left"></i>

</div>

<h2>History</h2>

<p>View complete history.</p>

</div>

</div>

<div class="footer">

© 2026 Dashboard

</div>

</div>

</body>
</html>
