<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>New Support Entry</title>


<!-- GOOGLE FONT -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>


<!-- FONT AWESOME -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
>


<style>

/* =========================================
   RESET
========================================= */

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}


/* =========================================
   BODY
========================================= */

body{

background:#005C3A;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}


/* =========================================
   BACKGROUND EFFECT
========================================= */

body::before{

content:"";

position:fixed;

left:-200px;

top:-200px;

width:500px;

height:500px;

background:#E53935;

border-radius:50%;

filter:blur(140px);

opacity:.35;

pointer-events:none;

}


body::after{

content:"";

position:fixed;

right:-180px;

bottom:-180px;

width:450px;

height:450px;

background:#0D8F5A;

border-radius:50%;

filter:blur(120px);

opacity:.35;

pointer-events:none;

}


/* =========================================
   CARD
========================================= */

.card{

width:100%;

max-width:650px;

background:white;

border-radius:25px;

padding:40px;

box-shadow:

0 25px 60px

rgba(0,0,0,.25);

position:relative;

z-index:1;

}


/* =========================================
   LOGO
========================================= */

.logo{

width:80px;

height:80px;

margin:0 auto 20px;

background:#006A4E;

border-radius:20px;

display:flex;

justify-content:center;

align-items:center;

font-size:35px;

color:white;

}


/* =========================================
   TITLE
========================================= */

h2{

text-align:center;

color:#006A4E;

margin-bottom:8px;

}


/* =========================================
   SUBTITLE
========================================= */

p{

text-align:center;

color:#777;

margin-bottom:35px;

}


/* =========================================
   FORM GROUP
========================================= */

.group{

margin-bottom:22px;

}


/* =========================================
   LABEL
========================================= */

.group label{

display:block;

font-weight:600;

margin-bottom:8px;

color:#333;

}


/* =========================================
   INPUT AREA
========================================= */

.input{

position:relative;

}


/* =========================================
   INPUT ICON
========================================= */

.input i{

position:absolute;

left:16px;

top:16px;

color:#006A4E;

font-size:18px;

z-index:2;

}


/* =========================================
   INPUT & TEXTAREA
========================================= */

.input input,

.input textarea{

width:100%;

padding:

15px

18px

15px

50px;

border:

2px solid #ddd;

border-radius:12px;

font-size:15px;

outline:none;

transition:.3s;

}


/* =========================================
   TEXTAREA
========================================= */

textarea{

resize:none;

height:120px;

}


/* =========================================
   INPUT FOCUS
========================================= */

.input input:focus,

.input textarea:focus{

border-color:#006A4E;

box-shadow:

0 0 15px

rgba(0,106,78,.2);

}


/* =========================================
   BUTTON
========================================= */

button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#006A4E;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}


/* =========================================
   BUTTON HOVER
========================================= */

button:hover{

background:#E53935;

}


/* =========================================
   BUTTON DISABLED
========================================= */

button:disabled{

opacity:.7;

cursor:not-allowed;

}


/* =========================================
   FOOTER
========================================= */

.footer{

margin-top:20px;

text-align:center;

font-size:13px;

color:#777;

}


/* =========================================
   MOBILE
========================================= */

@media(max-width:600px){

.card{

padding:25px;

}

}

</style>

</head>


<body>


<!-- =========================================
     MAIN CARD
========================================= -->

<div class="card">


<!-- =========================================
     LOGO
========================================= -->

<div class="logo">

<i class="fa-solid fa-headset"></i>

</div>


<!-- =========================================
     TITLE
========================================= -->

<h2>

New Support Entry

</h2>


<!-- =========================================
     COMPANY
========================================= -->

<p>

LINK4 COMMUNICATION

</p>


<!-- =========================================
     ENTRY FORM
========================================= -->

<form id="entryForm">


<!-- =========================================
     CUSTOMER ID
========================================= -->

<div class="group">


<label>

Customer ID

</label>


<div class="input">


<i class="fa-solid fa-network-wired"></i>


<input

type="text"

id="ip"

placeholder="Enter Customer ID"

required

autocomplete="off"

>


</div>


</div>



<!-- =========================================
     PROBLEM
========================================= -->

<div class="group">


<label>

Problem

</label>


<div class="input">


<i class="fa-solid fa-triangle-exclamation"></i>


<textarea

id="problem"

placeholder="Write Customer Problem"

required

></textarea>


</div>


</div>



<!-- =========================================
     REFERENCE
========================================= -->

<div class="group">


<label>

Reference

</label>


<div class="input">


<i class="fa-solid fa-file-lines"></i>


<input

type="text"

id="reference"

placeholder="Reference Number"

required

autocomplete="off"

>


</div>


</div>



<!-- =========================================
     SUBMIT BUTTON
========================================= -->

<button

type="submit"

id="submitBtn"

>

<i class="fa-solid fa-paper-plane"></i>

Submit Support

</button>


</form>



<!-- =========================================
     FOOTER
========================================= -->

<div class="footer">

© LINK4 COMMUNICATION

</div>


</div>



<script>


/*************************************************
 * GOOGLE APPS SCRIPT WEB APP URL
 *************************************************/

const API_URL =

"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";



/*************************************************
 * ENTRY FORM
 *************************************************/

const entryForm =

document.getElementById(

"entryForm"

);



/*************************************************
 * SUBMIT BUTTON
 *************************************************/

const submitBtn =

document.getElementById(

"submitBtn"

);



/*************************************************
 * FORM SUBMIT
 *************************************************/

entryForm.addEventListener(

"submit",

async function(e){


/*************************************************
 * STOP PAGE RELOAD
 *************************************************/

e.preventDefault();



/*************************************************
 * GET CUSTOMER ID
 *************************************************/

const customerId =

document

.getElementById("ip")

.value

.trim();



/*************************************************
 * GET PROBLEM
 *************************************************/

const problem =

document

.getElementById("problem")

.value

.trim();



/*************************************************
 * GET REFERENCE
 *************************************************/

const reference =

document

.getElementById("reference")

.value

.trim();



/*************************************************
 * VALIDATION
 *************************************************/

if(!customerId){

alert(

"Please enter Customer ID."

);

return;

}


if(!problem){

alert(

"Please enter Customer Problem."

);

return;

}


if(!reference){

alert(

"Please enter Reference."

);

return;

}



/*************************************************
 * SAVE ORIGINAL BUTTON TEXT
 *************************************************/

const oldButtonText =

submitBtn.innerHTML;



/*************************************************
 * DISABLE BUTTON
 *************************************************/

submitBtn.disabled = true;



/*************************************************
 * SHOW LOADING
 *************************************************/

submitBtn.innerHTML =

'<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';



try{


/*************************************************
 * SEND DATA TO GOOGLE APPS SCRIPT
 *************************************************/

const response =

await fetch(

API_URL,

{

method:"POST",

body:

JSON.stringify({

action:"newEntry",

customerId:

customerId,

problem:

problem,

reference:

reference

})

}

);



/*************************************************
 * READ RESPONSE
 *************************************************/

const result =

await response.json();



/*************************************************
 * SUCCESS
 *************************************************/

if(

result.success === true

){


alert(

"Support Entry Successfully Submitted!"

);



/*************************************************
 * RESET FORM
 *************************************************/

entryForm.reset();


}


/*************************************************
 * SERVER ERROR
 *************************************************/

else{


alert(

result.message ||

"Failed To Submit Support Entry."

);


}


}


/*************************************************
 * CONNECTION ERROR
 *************************************************/

catch(error){


console.error(

"Google Apps Script Error:",

error

);


alert(

"Failed To Submit. Please check your internet connection and try again."

);


}


/*************************************************
 * ENABLE BUTTON
 *************************************************/

submitBtn.disabled = false;



/*************************************************
 * RESTORE BUTTON TEXT
 *************************************************/

submitBtn.innerHTML =

oldButtonText;


}

);

</script>


</body>

</html>
```
