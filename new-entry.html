<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>New Support Entry</title>


<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>


<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}


body{

background:#005C3A;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}


body::before{

content:"";

position:fixed;

left:-200px;
top:-200px;

width:500px;
height:500px;

background:#E53935;

border-radius:50%;

filter:blur(140px);

opacity:.35;

pointer-events:none;

}


body::after{

content:"";

position:fixed;

right:-180px;
bottom:-180px;

width:450px;
height:450px;

background:#0D8F5A;

border-radius:50%;

filter:blur(120px);

opacity:.35;

pointer-events:none;

}


.card{

width:100%;
max-width:650px;

background:white;

border-radius:25px;

padding:40px;

box-shadow:
0 25px 60px
rgba(0,0,0,.25);

position:relative;

z-index:1;

}


.logo{

width:80px;
height:80px;

margin:0 auto 20px;

background:#006A4E;

border-radius:20px;

display:flex;

justify-content:center;
align-items:center;

font-size:35px;

color:white;

}


h2{

text-align:center;

color:#006A4E;

margin-bottom:8px;

}


p{

text-align:center;

color:#777;

margin-bottom:35px;

}


.group{

margin-bottom:22px;

}


.group label{

display:block;

font-weight:600;

margin-bottom:8px;

color:#333;

}


.input{

position:relative;

}


.input i{

position:absolute;

left:16px;
top:16px;

color:#006A4E;

font-size:18px;

z-index:2;

}


.input input,
.input textarea{

width:100%;

padding:
15px
18px
15px
50px;

border:2px solid #ddd;

border-radius:12px;

font-size:15px;

outline:none;

transition:.3s;

background:white;

}


textarea{

resize:none;

height:120px;

}


.input input:focus,
.input textarea:focus{

border-color:#006A4E;

box-shadow:
0 0 15px
rgba(0,106,78,.2);

}


button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#006A4E;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}


button:hover{

background:#E53935;

}


button:disabled{

opacity:.7;

cursor:not-allowed;

}


.footer{

margin-top:20px;

text-align:center;

font-size:13px;

color:#777;

}


@media(max-width:600px){

.card{

padding:25px;

}

}

</style>

</head>


<body>


<div class="card">


<div class="logo">

<i class="fa-solid fa-headset"></i>

</div>


<h2>

New Support Entry

</h2>


<p>

LINK4 COMMUNICATION

</p>


<form id="entryForm">


<div class="group">

<label>

Customer ID

</label>


<div class="input">

<i class="fa-solid fa-network-wired"></i>


<input

type="text"

id="ip"

placeholder="Enter Customer ID"

required

autocomplete="off"

>

</div>

</div>



<div class="group">

<label>

Problem

</label>


<div class="input">

<i class="fa-solid fa-triangle-exclamation"></i>


<textarea

id="problem"

placeholder="Write Customer Problem"

required

></textarea>

</div>

</div>



<div class="group">

<label>

Reference

</label>


<div class="input">

<i class="fa-solid fa-file-lines"></i>


<input

type="text"

id="reference"

placeholder="Reference Number"

autocomplete="off"

>

</div>

</div>



<button

type="submit"

id="submitBtn"

>

<i class="fa-solid fa-paper-plane"></i>

Submit Support

</button>


</form>



<div class="footer">

© LINK4 COMMUNICATION

</div>


</div>



<script>


// ============================================
// GOOGLE APPS SCRIPT WEB APP URL
// ============================================

const API_URL =
"https://script.google.com/macros/s/AKfycbw1NiYF5qNEFGVXdIWZ3I3lpJXEX57uBM0M06oqVVJcRUiuCTAf8NkKycGWtyIhhxWh4g/exec";



// ============================================
// GET FORM
// ============================================

const entryForm =
document.getElementById("entryForm");


// ============================================
// GET BUTTON
// ============================================

const submitBtn =
document.getElementById("submitBtn");



// ============================================
// SUBMIT FORM
// ============================================

entryForm.addEventListener(
"submit",
async function(e){

e.preventDefault();


// ==========================================
// GET CUSTOMER ID
// ==========================================

const customerId =
document
.getElementById("ip")
.value
.trim();


// ==========================================
// GET PROBLEM
// ==========================================

const problem =
document
.getElementById("problem")
.value
.trim();


// ==========================================
// GET REFERENCE
// ==========================================

const reference =
document
.getElementById("reference")
.value
.trim();


// ==========================================
// VALIDATION
// ==========================================

if(!customerId){

alert(
"Please enter Customer ID."
);

return;

}


if(!problem){

alert(
"Please enter Customer Problem."
);

return;

}


// ==========================================
// SAVE BUTTON TEXT
// ==========================================

const oldButtonText =
submitBtn.innerHTML;


// ==========================================
// DISABLE BUTTON
// ==========================================

submitBtn.disabled = true;

submitBtn.innerHTML =
'<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';


// ==========================================
// CREATE FORM DATA
// ==========================================

const formData =
new URLSearchParams();


// ==========================================
// ACTION
// ==========================================

formData.append(
"action",
"newEntry"
);


// ==========================================
// CUSTOMER ID
// ==========================================

formData.append(
"customerId",
customerId
);


// ==========================================
// PROBLEM
// ==========================================

formData.append(
"problem",
problem
);


// ==========================================
// REFERENCE
// ==========================================

formData.append(
"reference",
reference
);


// ==========================================
// SEND TO GOOGLE SHEET
// ==========================================

try{


await fetch(

API_URL,

{

method:"POST",

mode:"no-cors",

headers:{

"Content-Type":
"application/x-www-form-urlencoded;charset=UTF-8"

},

body:
formData.toString()

}

);


// ==========================================
// SUCCESS
// ==========================================

alert(

"Support Entry Successfully Submitted!"

);


// ==========================================
// RESET FORM
// ==========================================

entryForm.reset();


}

catch(error){


console.error(

"Submit Error:",

error

);


alert(

"Failed To Submit. Please try again."

);


}


// ==========================================
// ENABLE BUTTON
// ==========================================

submitBtn.disabled = false;


// ==========================================
// RESTORE BUTTON
// ==========================================

submitBtn.innerHTML =
oldButtonText;


}

);

</script>


</body>

</html>
