<!-- ===========================
PART-2
Google Sheet Connection + Table Load
=========================== -->

<script>

// ======================================
// Google Apps Script URL
// ======================================

const API_URL =
"https://script.google.com/macros/s/AKfycbyORO5enoKoHkRV8FkyNjrJ-9hy0uAFRtLQkSPlVlvsMUERua5brnaoN424K6yakLEM/exec";

const tbody =
document.getElementById("callTable");

// ======================================
// Load Pending Call
// ======================================

loadPendingCall();

async function loadPendingCall(){

tbody.innerHTML=

`<tr>

<td colspan="8" style="text-align:center;">

Loading...

</td>

</tr>`;

try{

const res =
await fetch(API_URL + "?page=call");

const data =
await res.json();

tbody.innerHTML="";

if(data.length==0){

tbody.innerHTML=

`<tr>

<td colspan="8" style="text-align:center;">

No Pending Call

</td>

</tr>`;

return;

}

data.forEach((row,index)=>{

if(row[0]=="") return;

tbody.innerHTML += `

<tr>

<td>${row[0]}</td>

<td>${row[1]}</td>

<td>${row[2]}</td>

<td>${row[3]}</td>

<td>${row[4]}</td>

<td>${row[5]}</td>

<td>

<span class="status">
Pending
</span>

</td>

<td>

<button

class="view-btn"

onclick="viewCall(${index})">

<i class="fa-solid fa-eye"></i>

View

</button>

<button

class="work-btn"

onclick="workCall(${index})">

<i class="fa-solid fa-phone"></i>

Work

</button>

</td>

</tr>

`;

});

window.callData=data;

}

catch(err){

tbody.innerHTML=

`<tr>

<td colspan="8"

style="text-align:center;color:red;">

Failed To Load Data

</td>

</tr>`;

console.log(err);

}

}

// ======================================
// Search
// ======================================

document.getElementById("search")

.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll("#callTable tr")

.forEach(tr=>{

tr.style.display=

tr.innerText.toLowerCase()

.includes(value)

? ""

: "none";

});

});

</script>

<!-- ======================================
PART-5
WORK BUTTON JAVASCRIPT
====================================== -->


<script>


// ===============================
// WORK BUTTON CLICK
// ===============================


function workCall(index){


const row = window.callData[index];


// Popup Open

document.getElementById("workModal").style.display="flex";


// IP Show

document.getElementById("workIP").value = row[0];


// Previous Work Show

document.getElementById("callWork").value = row[7] || "";


// Save করার জন্য index রাখা

window.workIndex = index;


}



// ===============================
// CLOSE WORK POPUP
// ===============================


document.getElementById("closeWork").onclick=function(){

document.getElementById("workModal").style.display="none";

}



document.getElementById("cancelWorkBtn").onclick=function(){

document.getElementById("workModal").style.display="none";

}



// ===============================
// CLICK OUTSIDE CLOSE
// ===============================


window.addEventListener("click",function(e){


if(e.target==document.getElementById("workModal")){


document.getElementById("workModal").style.display="none";


}


});







</script>
<!-- ======================================
PART-6
SAVE WORK TO GOOGLE SHEET
====================================== -->


<script>


document.getElementById("saveWorkBtn").onclick = async function(){


let index = window.workIndex;


let row = window.callData[index];



let callBy =
document.getElementById("callBy").value.trim();


let callWork =
document.getElementById("callWork").value.trim();



if(work==""){

alert("Call Work লিখুন");

return;

}



this.disabled=true;

this.innerHTML="Saving...";



try{


const formData = new URLSearchParams();



formData.append("action","saveWork");

formData.append("ip",row[0]);

formData.append("callBy",callBy);

formData.append("callWork",callWork);



const response = await fetch(API_URL,{

method:"POST",

body:formData

});



const result = await response.text();



if(result=="OK"){


alert("Support Work Saved Successfully");



document.getElementById("workModal").style.display="none";


// Reload Table

loadPendingCall();



}
else{


alert(result);


}



}

catch(error){


console.log(error);


alert("Save Failed");


}



this.disabled=false;

this.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save';



}



</script>
